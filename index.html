<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0% !important; }
        body { background-color: #f1f5f9; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-white px-6 py-3 shadow-md border-b-4 border-blue-900 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4 md:gap-6">
            <img src="nucleo.jpg" alt="NRE Umuarama" class="h-8 md:h-12 object-contain opacity-80">
            <img src="logoA.jpg" alt="Brasão CCM Anchieta" class="h-20 md:h-28 object-contain rounded-full shadow-lg border-4 border-blue-900 bg-white p-0.5">
            <div class="hidden lg:block md:ml-2">
                <h1 class="text-xl lg:text-3xl font-black text-blue-900 uppercase leading-none tracking-tight">Colégio Estadual</h1>
                <h1 class="text-xl lg:text-3xl font-black text-blue-900 uppercase leading-none tracking-tight">Cívico Militar Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-[0.3em] mt-1 text-base lg:text-lg italic uppercase font-serif">Frequenciômetro</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex flex-col items-center md:items-end gap-1">
                <button onclick="carregarDados()" class="bg-blue-900 hover:bg-blue-800 text-white text-[10px] md:text-xs font-bold py-2 px-6 rounded shadow-lg active:scale-95 transition-all flex items-center gap-2">
                    🔄 ATUALIZAR DADOS
                </button>
                <p class="text-blue-900 font-black text-[10px] md:text-xs uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.jpg" alt="Mascotes CCMA" class="h-14 md:h-20 object-contain hidden sm:block drop-shadow-md">
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 w-full max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10">
            
            <section class="flex flex-col">
                <div class="bg-blue-600 text-white text-center py-3 rounded-full font-black text-xl md:text-2xl shadow-lg mb-4 uppercase tracking-widest border-b-4 border-blue-700">
                    Turno Manhã
                </div>
                <div id="box-manha" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4"></div>
            </section>

            <section class="flex flex-col">
                <div class="bg-blue-900 text-white text-center py-3 rounded-full font-black text-xl md:text-2xl shadow-lg mb-4 uppercase tracking-widest border-b-4 border-slate-950">
                    Turno Tarde
                </div>
                <div id="box-tarde" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4"></div>
            </section>
        </div>
    </main>

    <footer class="w-full bg-blue-950 text-white p-3 flex flex-wrap justify-center gap-6 md:gap-12 text-xs md:text-sm font-bold uppercase tracking-wider">
        <div class="flex items-center gap-2"><span class="text-xl">✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span class="text-xl">👍</span> 90,00-94,99%</div>
        <div class="flex items-center gap-2"><span class="text-xl">👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                document.getElementById('box-manha').innerHTML = '';
                document.getElementById('box-tarde').innerHTML = '';

                const linhas = csvStr.split(/\r?\n/);

                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    // Suporte a separador ; ou ,
                    let colunas = linha.split(';');
                    if (colunas.length < 2) colunas = linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoPlano = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        let qtdTrofeus = 0;
                        if (colunas[3]) {
                            let t = parseInt(colunas[3].replace(/"/g, '').trim());
                            if (!isNaN(t)) qtdTrofeus = t;
                        }

                        let blocoDestino = blocoPlano.includes('manha') ? 'manha' : 'tarde';
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino, qtdTrofeus);
                        }
                    }
                }

                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', (b.dataset.width > 100 ? 100 : b.dataset.width) + '%', 'important');
                    });
                }, 300);

            } catch (err) { console.error("Erro no carregamento:", err); }
        }

        function renderizarTurma(nome, valor, bloco, trofeus) {
            const box = document.getElementById('box-' + bloco);
            if (!box) return;
            
            let corBarra = valor >= 95 ? 'bg-emerald-500' : (valor >= 90 ? 'bg-amber-400' : 'bg-rose-600');
            let corTexto = valor >= 95 ? 'text-emerald-700' : (valor >= 90 ? 'text-amber-600' : 'text-rose-700');
            let emoji = valor >= 95 ? '👏' : (valor >= 90 ? '👍' : '✋');
            
            // AJUSTE: Duas casas decimais garantidas
            let valorFormatado = Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            let classeCard = valor >= 95 
                ? 'border-4 border-yellow-400 bg-amber-50 shadow-lg scale-[1.03]' 
                : 'border border-slate-200 bg-white shadow-md';

            let stringTrofeus = trofeus > 0 ? '🏆'.repeat(trofeus) : '';

            box.innerHTML += `
                <div class="p-4 rounded-xl flex flex-col justify-between transition-all duration-300 ${classeCard}">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex flex-col overflow-hidden">
                            <span class="font-black text-slate-800 text-sm md:text-base xl:text-lg uppercase tracking-tighter truncate pr-1">${nome}</span>
                            <span class="text-xs mt-1 drop-shadow-sm">${stringTrofeus}</span>
                        </div>
                        <span class="text-xl flex-shrink-0 ml-1">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-2xl md:text-3xl xl:text-4xl my-1 whitespace-nowrap">
                        ${valorFormatado}%
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden border border-slate-200">
                        <div class="barra-frequencia ${corBarra} h-full rounded-full" data-width="${valor}"></div>
                    </div>
                </div>`;
        }

        window.onload = carregarDados;
        setInterval(carregarDados, 900000);
    </script>
</body>
</html>

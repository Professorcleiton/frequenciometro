<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        body { background-color: #f1f5f9; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .fundo-textura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('LogoA.png'); background-repeat: no-repeat; background-position: center; background-size: cover; opacity: 0.05; z-index: -1; pointer-events: none; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { border-left-width: 16px; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .btn-ctrl { background: rgba(255, 255, 255, 0.15); color: white; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s; }
        .btn-ctrl:hover { background: #2563eb; transform: scale(1.1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col">

    <div class="fundo-textura"></div>

    <header class="bg-white/95 px-8 py-2 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <img src="nucleo.png" alt="NRE" class="h-14 object-contain">
            <img src="LogoA.png" alt="CCM Anchieta" class="h-20 object-contain">
        </div>
        <div class="text-center flex-grow">
            <h1 class="text-3xl font-black text-[#1e3a8a] uppercase leading-none tracking-tighter">CCM ANCHIETA</h1>
            <p class="text-slate-500 font-bold tracking-[0.2em] text-[10px] uppercase italic block mb-1">FREQUENCIÔMETRO DIGITAL</p>
            <p id="info-semana-detalhada" class="text-blue-700 font-bold text-lg bg-blue-50 px-6 py-1 rounded-full inline-block border border-blue-100 italic">Calculando dados anteriores...</p>
        </div>
        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-100 px-4 py-1 rounded-full mb-1">Página --</p>
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 w-full max-w-[1850px] mx-auto overflow-hidden z-10 flex items-center justify-center text-center">
        <p id="status-msg" class="text-blue-900 font-bold animate-pulse text-2xl uppercase">Carregando dados da planilha...</p>
    </main>

    <footer class="w-full bg-[#0f172a] text-white p-3 flex justify-between items-center px-16 text-xs font-black uppercase tracking-widest shrink-0 z-50">
        <div class="flex gap-10 items-center text-[10px]">
            <div class="flex items-center gap-2"><span>✋</span> < 90%</div>
            <div class="flex items-center gap-2"><span>👍</span> 90-95%</div>
            <div class="flex items-center gap-2"><span>👏</span> > 95%</div>
        </div>

        <div class="flex gap-4 items-center bg-white/5 px-4 py-1 rounded-full">
            <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
            <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
            <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
        </div>

        <div class="flex items-center gap-4">
            <span class="opacity-50 text-[10px]">CCM ANCHIETA</span>
            <img src="criancas.png" alt="Estudantes" class="h-10 object-contain">
        </div>
    </footer>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;

        function atualizarTextoSemana() {
            const hoje = new Date();
            const dataReferencia = new Date(hoje.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            const inicioAno = new Date(dataReferencia.getFullYear(), 0, 1);
            const dias = Math.floor((dataReferencia - inicioAno) / (24 * 60 * 60 * 1000));
            const numSem = Math.ceil((dias + inicioAno.getDay() + 1) / 7);

            const dSem = dataReferencia.getDay();
            const diffSeg = dataReferencia.getDate() - (dSem === 0 ? 6 : dSem - 1);
            const seg = new Date(new Date(dataReferencia).setDate(diffSeg));
            const dom = new Date(new Date(seg).setDate(seg.getDate() + 6));
            
            const fmt = (d) => d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            document.getElementById("info-semana-detalhada").innerText = `DADOS DA SEMANA ${numSem} • ${fmt(seg)} a ${fmt(dom)}`;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            if (isPaused) clearInterval(loopInterval); else iniciarAnimacao();
        }

        function mudarSlide(direcao) {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length <= 1) return;
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            if (!isPaused) { clearInterval(loopInterval); iniciarAnimacao(); }
        }

        async function carregarDados() {
            try {
                const res = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const txt = await res.text();
                const linhas = txt.split(/\r?\n/).filter(l => l.trim().length > 5);
                todasTurmas = [];
                
                for (let i = 1; i < linhas.length; i++) {
                    const cols = linhas[i].split(/[,;]/);
                    if (cols.length >= 2) {
                        const nome = cols[0].replace(/"/g, "").trim();
                        const freq = parseFloat(cols[1].replace(/"/g, "").replace(",", ".").trim());
                        const turno = cols[2]?.toLowerCase().replace(/"/g, "").trim() || "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        
                        let valHist = cols[4] ? cols[4].replace(/"/g, "").replace(",", ".").trim() : null;
                        let hist = (valHist && !isNaN(parseFloat(valHist))) ? parseFloat(valHist) : freq;
                        if (hist > 100) hist = freq; 

                        if (!isNaN(freq)) {
                            todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof, historico: hist });
                        }
                    }
                }
                if (todasTurmas.length > 0) {
                    atualizarTextoSemana();
                    gerarSlides();
                }
            } catch (err) { console.error(err); }
        }

        // Função auxiliar para definir a cor do texto com base no valor
        function obterCorTexto(valor) {
            if (valor >= 95) return "text-emerald-600"; // Verde
            if (valor >= 90) return "text-amber-500";   // Laranja
            return "text-rose-600";                      // Vermelho
        }

        // Função auxiliar para definir a cor da borda inferior com base no valor
        function obterCorBorda(valor) {
            if (valor >= 95) return "border-emerald-600";
            if (valor >= 90) return "border-amber-500";
            return "border-rose-600";
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            const manha = todasTurmas.filter(t => t.bloco.includes("man"));
            const tarde = todasTurmas.filter(t => t.bloco.includes("tard"));
            
            if (manha.length > 0) montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600");
            if (tarde.length > 0) montarPaginas(tarde, "TURNO TARDE", "bg-blue-900");

            const mSem = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
            const mTot = todasTurmas.reduce((acc, t) => acc + t.historico, 0) / todasTurmas.length;
            
            // Definição dinâmica das cores das médias gerais
            const corTextoSemana = obterCorTexto(mSem);
            const corBordaSemana = obterCorBorda(mSem);
            
            const corTextoAcumulada = obterCorTexto(mTot);
            const corBordaAcumulada = obterCorBorda(mTot);

            const mSlide = document.createElement("div");
            mSlide.className = "pagina-slide w-full h-full";
            mSlide.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full gap-10">
                    <div class="grid grid-cols-2 gap-12 w-full max-w-6xl">
                        <div class="bg-white/90 p-10 rounded-[3rem] shadow-2xl border-b-[15px] ${corBordaSemana} text-center">
                            <h3 class="text-3xl font-black text-blue-900 uppercase mb-4">Média Semanal</h3>
                            <div class="text-[10rem] leading-none font-black ${corTextoSemana}">${mSem.toFixed(1)}%</div>
                        </div>
                        <div class="bg-white/90 p-10 rounded-[3rem] shadow-2xl border-b-[15px] ${corBordaAcumulada} text-center">
                            <h3 class="text-3xl font-black text-slate-800 uppercase mb-4">Média Acumulada</h3>
                            <div class="text-[10rem] leading-none font-black ${corTextoAcumulada}">${mTot.toFixed(1)}%</div>
                        </div>
                    </div>
                </div>`;
            container.appendChild(mSlide);
            iniciarAnimacao();
        }

        function montarPaginas(lista, titulo, cor) {
            const container = document.getElementById("container-slides");
            for (let i = 0; i < lista.length; i += 6) {
                const pedaço = lista.slice(i, i + 6);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full pt-4";
                slide.innerHTML = `<div class="flex flex-col h-full items-center"><div class="${cor} text-white py-3 px-20 rounded-full font-black text-3xl mb-12 shadow-md uppercase w-fit tracking-widest">${titulo}</div><div class="grid grid-cols-3 gap-10 w-full">${pedaço.map(t => { const cB = t.valor >= 95 ? "#10b981" : (t.valor >= 90 ? "#f59e0b" : "#e11d48"); return `<div class="p-8 rounded-[2rem] card-turma border-l-[20px] text-left"><p class="font-black text-slate-900 text-4xl uppercase truncate mb-4">${t.nome}</p><div class="w-full bg-slate-200 rounded-2xl h-16 overflow-hidden relative shadow-inner"><div class="barra-frequencia h-full text-3xl" style="background-color: ${cB}; width: ${t.valor}%">${t.valor.toFixed(1)}%</div></div><p class="mt-3 text-center text-2xl">${"🏆".repeat(t.trofeus)}</p></div>`; }).join("")}</div></div>`;
                container.appendChild(slide);
            }
        }

        function iniciarAnimacao() {
            if (loopInterval) clearInterval(loopInterval);
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            if (!slides[indexSlide]) indexSlide = 0;
            slides.forEach(s => s.classList.remove("active"));
            slides[indexSlide].classList.add('active');
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            if (!isPaused) loopInterval = setInterval(() => mudarSlide(1), 10000);
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

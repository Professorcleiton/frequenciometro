<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro V2 - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl border-4 border-blue-900 overflow-hidden">
        <header class="p-6 border-b-2 border-gray-100 flex flex-col md:flex-row items-center justify-between bg-white">
            <div class="text-center md:text-left">
                <h1 class="text-2xl md:text-3xl font-black text-gray-800 uppercase">Colégio Estadual <br>Cívico Militar Anchieta</h1>
                <p class="text-blue-700 font-bold tracking-widest mt-2 italic uppercase underline">PAINEL DE FREQUÊNCIA ATUALIZADO</p>
            </div>
            <button onclick="carregarDadosAgora()" class="mt-4 md:mt-0 bg-blue-900 text-white text-xs font-bold py-2 px-6 rounded-full shadow-lg">
                🔄 FORÇAR ATUALIZAÇÃO
            </button>
        </header>

        <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-4">
                <h3 class="bg-orange-500 text-white text-center font-black py-2 rounded-lg">MANHÃ 1</h3>
                <div id="box-manha1" class="space-y-3 min-h-[100px] border-2 border-dashed border-gray-100 rounded-lg"></div>
            </div>
            <div class="space-y-4">
                <h3 class="bg-cyan-500 text-white text-center font-black py-2 rounded-lg">MANHÃ 2</h3>
                <div id="box-manha2" class="space-y-3 min-h-[100px] border-2 border-dashed border-gray-100 rounded-lg"></div>
            </div>
            <div class="space-y-4">
                <h3 class="bg-green-600 text-white text-center font-black py-2 rounded-lg">TARDE</h3>
                <div id="box-tarde" class="space-y-3 min-h-[100px] border-2 border-dashed border-gray-100 rounded-lg"></div>
            </div>
        </main>
    </div>

    <script>
        const PLANILHA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlfXs3ZlGbJoyVAQxdJd32Kx2ahdPlO0_Kv0pqCsCs6BAJwLOkjqVdA4txmHISIpswwTXfhg6YFSrc/pub?output=csv';

        async function carregarDadosAgora() {
            try {
                // O "v=" com o número aleatório garante que o Google Sheets mande os dados MAIS RECENTES
                const response = await fetch(PLANILHA_URL + "&v=" + Math.random());
                const csvData = await response.text();
                
                // Limpa os boxes
                document.getElementById('box-manha1').innerHTML = '';
                document.getElementById('box-manha2').innerHTML = '';
                document.getElementById('box-tarde').innerHTML = '';

                const linhas = csvData.split(/\r?\n/);

                linhas.slice(1).forEach(linha => {
                    if(!linha.trim()) return;
                    
                    // Detecta o divisor ponto e vírgula da sua planilha
                    const col = linha.split(';');
                    
                    if(col.length >= 2) {
                        const nome = col[0].replace(/"/g, '').trim();
                        const freq = col[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        const bloco = col[2] ? col[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        const valor = parseFloat(freq);
                        if(!isNaN(valor) && nome !== "") {
                            renderizarNoBox(nome, valor, bloco);
                        }
                    }
                });

                // Animação
                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 600);

            } catch (e) { console.error(e); }
        }

        function renderizarNoBox(nome, valor, bloco) {
            const box = document.getElementById('box-' + bloco) || document.getElementById('box-tarde');
            let cor = valor >= 95 ? 'bg-green-500' : (valor >= 90 ? 'bg-yellow-500' : 'bg-red-500');
            
            box.innerHTML += `
                <div class="bg-gray-50 p-2 rounded border border-gray-200 shadow-sm">
                    <div class="flex justify-between text-[10px] font-bold mb-1">
                        <span>${nome}</span>
                        <span>${valor.toFixed(1).replace('.', ',')}%</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                        <div class="barra-frequencia ${cor} h-full" data-width="${valor}"></div>
                    </div>
                </div>`;
        }

        window.onload = carregarDadosAgora;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        body { background-color: #f1f5f9; overflow: hidden; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { min-height: 110px; border-left-width: 8px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans h-screen flex flex-col">

    <header class="bg-white px-6 py-2 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <img src="nucleo.png" alt="NRE" class="h-8 md:h-10 object-contain">
            <img src="logoA.png" alt="Brasão" class="h-16 md:h-20 object-contain rounded-full border-2 border-[#1e3a8a] bg-white p-0.5 shadow-sm">
            <div class="ml-2 text-[#1e3a8a]">
                <h1 class="text-lg md:text-2xl font-black uppercase leading-none tracking-tight">CCM Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-[0.1em] text-[8px] md:text-[10px] uppercase italic leading-none mt-1">Frequenciômetro Digital</p>
            </div>
        </div>
        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[9px] md:text-[10px] uppercase bg-blue-50 px-4 py-1 rounded-full mb-1">Sincronizando...</p>
            <p class="text-[#1e3a8a] font-bold text-[8px] md:text-[9px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 w-full max-w-[1600px] mx-auto overflow-hidden flex flex-col justify-center text-center">
        <div id="status-msg">
            <p class="text-blue-900 font-bold animate-pulse text-xl uppercase">Organizando turmas por séries...</p>
        </div>
    </main>

    <footer class="w-full bg-[#0f172a] text-white p-2 flex justify-center gap-8 text-[9px] md:text-xs font-bold uppercase tracking-wider shrink-0">
        <div class="flex items-center gap-2"><span>✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span>👍</span> 90,00 - 94,99%</div>
        <div class="flex items-center gap-2"><span>👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';
        
        let todasTurmas = [];
        let loopInterval = null;
        let indexSlide = 0;
        const ITENS_POR_LADO = 6; 

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&nocache=" + new Date().getTime());
                const csvStr = await response.text();
                
                todasTurmas = [];
                const linhas = csvStr.split(/\r?\n/).filter(l => l.trim().length > 2);
                
                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(';');
                    if (cols.length < 2) cols = linhas[i].split(',');
                    
                    if (cols.length >= 2) {
                        const nomeOriginal = cols[0].replace(/"/g, '').trim();
                        const freqLimpa = cols[1].replace(/[^\d,.]/g, '').replace(',', '.');
                        const valor = parseFloat(freqLimpa);

                        if (!isNaN(valor) && nomeOriginal !== "") {
                            todasTurmas.push({
                                nome: nomeOriginal,
                                valor: valor,
                                bloco: cols[2] ? cols[2].toLowerCase().trim() : 'tarde',
                                trofeus: cols[3] ? parseInt(cols[3]) || 0 : 0
                            });
                        }
                    }
                }

                if (todasTurmas.length > 0) montarSlides();
                else document.getElementById('status-msg').innerHTML = "Nenhuma turma encontrada.";
            } catch (err) {
                document.getElementById('status-msg').innerHTML = Erro: ${err.message};
            }
        }

        function montarSlides() {
            const container = document.getElementById('container-slides');
            container.innerHTML = '';
            container.className = "flex-grow p-4 w-full max-w-[1600px] mx-auto overflow-hidden flex flex-col justify-center";
            
            const series = [
                { id: '6', titulo: '6º ANOS' }, { id: '7', titulo: '7º ANOS' },
                { id: '8', titulo: '8º ANOS' }, { id: '9', titulo: '9º ANOS' },
                { id: '1', titulo: '1º ANOS' }, { id: '2', titulo: '2º ANOS' }, { id: '3', titulo: '3º ANOS' }
            ];

            let slidesGerados = 0;

            series.forEach(serie => {
                // Filtro mais robusto: procura o número em qualquer lugar do início do nome
                const turmasDaSerie = todasTurmas.filter(t => t.nome.trim().includes(serie.id));
                
                if (turmasDaSerie.length > 0) {
                    const tManha = turmasDaSerie.filter(t => t.bloco.includes('manha'));
                    const tTarde = turmasDaSerie.filter(t => t.bloco.includes('tarde'));
                    const maxPaginas = Math.ceil(Math.max(tManha.length, tTarde.length) / ITENS_POR_LADO);

                    for (let p = 0; p < maxPaginas; p++) {
                        const slide = document.createElement('div');
                        slide.className = "pagina-slide w-full h-full";
                        slide.innerHTML = `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                                <section>
                                    <div class="bg-blue-600 text-white text-center py-2 rounded-full font-black text-lg mb-4 shadow-md uppercase tracking-widest">${serie.titulo} - MANHÃ</div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        ${tManha.slice(p * ITENS_POR_LADO, (p + 1) * ITENS_POR_LADO).map(t => criarCard(t)).join('')}
                                    </div>
                                </section>
                                <section>
                                    <div class="bg-blue-900 text-white text-center py-2 rounded-full font-black text-lg mb-4 shadow-md uppercase tracking-widest">${serie.titulo} - TARDE</div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        ${tTarde.slice(p * ITENS_POR_LADO, (p + 1) * ITENS_POR_LADO).map(t => criarCard(t)).join('')}
                                    </div>
                                </section>
                            </div>`;
                        container.appendChild(slide);
                        slidesGerados++;
                    }
                }
            });

            // Slide de Ranking Geral (Sempre por último)
            const rankingSlide = document.createElement('div');
            rankingSlide.className = "pagina-slide w-full h-full";
            const top10 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 10);
            rankingSlide.innerHTML = `
                <div class="flex flex-col h-full items-center">
                    <div class="bg-yellow-500 text-blue-900 w-full text-center py-3 rounded-full font-black text-2xl mb-6 shadow-xl uppercase border-4 border-yellow-300">🏆 RANKING GERAL - TOP 10 🏆</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                        ${top10.map((t, i) => `
                            <div class="p-3 rounded-xl shadow-lg flex items-center justify-between bg-blue-900 border-l-8 border-yellow-400 text-white">
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl font-black text-yellow-400">${i+1}º</span>
                                    <span class="font-black text-sm md:text-base uppercase">${t.nome}</span>
                                </div>
                                <div class="text-2xl font-black text-yellow-400">${t.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            container.appendChild(rankingSlide);

            iniciarLoop();
        }

        function criarCard(t) {
            const corBarra = t.valor >= 95 ? '#10b981' : (t.valor >= 90 ? '#f59e0b' : '#e11d48');
            const borda = t.valor >= 95 ? 'border-emerald-500' : (t.valor >= 90 ? 'border-amber-400' : 'border-rose-600');
            const corTexto = t.valor >= 95 ? 'text-emerald-700' : (t.valor >= 90 ? 'text-amber-600' : 'text-rose-700');
            return `
                <div class="p-3 rounded-xl card-turma shadow-md flex flex-col justify-between bg-white ${borda} border-l-8">
                    <div class="flex justify-between items-start leading-none text-left">
                        <div class="flex flex-col overflow-hidden">
                            <span class="font-black text-slate-800 text-[11px] md:text-[13px] uppercase truncate w-32 md:w-40">${t.nome}</span>
                            <span class="text-[10px] mt-1">${'🏆'.repeat(t.trofeus)}</span>
                        </div>
                        <span class="text-base">${t.valor >= 95 ? '👏' : (t.valor >= 90 ? '👍' : '✋')}</span>
                    </div>
                    <div class="${corTexto} font-black text-2xl my-1 text-left">${t.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%</div>
                    <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                        <div class="barra-frequencia h-full" style="background-color: ${corBarra}; width: ${t.valor > 100 ? 100 : t.valor}% !important;"></div>
                    </div>
                </div>`;
        }

        function iniciarLoop() {
            if (loopInterval) clearInterval(loopInterval);
            const slides = document.querySelectorAll('.pagina-slide');
            if (slides.length === 0) return;
            indexSlide = 0;
            slides[0].classList.add('active');
            document.getElementById('indicador-pagina').innerText = Página 1 de ${slides.length};
            loopInterval = setInterval(() => {
                slides[indexSlide].classList.remove('active');
                indexSlide = (indexSlide + 1) % slides.length;
                slides[indexSlide].classList.add('active');
                document.getElementById('indicador-pagina').innerText = Página ${indexSlide + 1} de ${slides.length};
            }, 10000); 
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

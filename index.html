<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0% !important; }
        body { background-color: #f8fafc; overflow-x: hidden; }
        @media (min-height: 800px) {
            main { height: calc(100vh - 180px); overflow: hidden; }
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-white px-6 py-4 shadow-sm border-b-4 border-blue-900 flex flex-col md:flex-row justify-between items-center gap-4">
        
        <div class="flex items-center gap-4 md:gap-6">
            <img src="nucleo.png" alt="NRE Umuarama" class="h-10 md:h-16 object-contain opacity-80">
            <img src="logoA.png" alt="Brasão CCM Anchieta" class="h-24 md:h-32 object-contain rounded-full shadow-lg border-4 border-blue-900 bg-white p-1">
            
            <div class="hidden lg:block md:ml-2">
                <h1 class="text-xl lg:text-3xl font-black text-gray-800 uppercase leading-none">Colégio Estadual</h1>
                <h1 class="text-xl lg:text-3xl font-black text-gray-800 uppercase leading-none">Cívico Militar Anchieta</h1>
                <p class="text-blue-900 font-bold tracking-[0.3em] mt-1 text-base lg:text-lg italic uppercase font-serif">Frequenciômetro</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex flex-col items-center md:items-end gap-1">
                <button onclick="carregarDados()" class="bg-blue-900 hover:bg-blue-800 text-white text-[10px] md:text-xs font-bold py-2 px-6 rounded shadow active:scale-95 transition-all flex items-center gap-2">
                    🔄 ATUALIZAR DADOS
                </button>
                <p class="text-gray-600 font-bold text-[10px] md:text-xs uppercase tracking-widest mt-1">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.jpg" alt="Mascotes CCMA" class="h-16 md:h-28 object-contain hidden sm:block drop-shadow-md">
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 w-full max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 h-full">
            
            <section class="flex flex-col h-full">
                <div class="bg-[#f97316] text-white text-center py-3 rounded-full font-black text-xl md:text-2xl shadow-md mb-4 uppercase tracking-wide">
                    Turno Manhã
                </div>
                <div id="box-manha" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 content-start overflow-y-auto pr-2"></div>
            </section>

            <section class="flex flex-col h-full">
                <div class="bg-[#16a34a] text-white text-center py-3 rounded-full font-black text-xl md:text-2xl shadow-md mb-4 uppercase tracking-wide">
                    Turno Tarde
                </div>
                <div id="box-tarde" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 content-start overflow-y-auto pr-2"></div>
            </section>

        </div>
    </main>

    <footer class="w-full mt-auto">
        <div class="bg-gray-900 text-white p-3 flex flex-wrap justify-center gap-6 md:gap-12 text-xs md:text-sm font-bold uppercase tracking-wider shadow-inner">
            <div class="flex items-center gap-2">
                <span class="text-xl md:text-2xl">✋</span>
                <span>[ <span class="text-red-500">VERMELHO</span> = CRÍTICA < 90% ]</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xl md:text-2xl">👍</span>
                <span>[ <span class="text-yellow-400">AMARELO</span> = ATENÇÃO 90-95% ]</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xl md:text-2xl">👏</span>
                <span>[ <span class="text-green-500">VERDE</span> = BOA > 95% ]</span>
            </div>
        </div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                document.getElementById('box-manha').innerHTML = '';
                document.getElementById('box-tarde').innerHTML = '';

                const linhas = csvStr.split(/\r?\n/);

                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoPlano = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        // LÓGICA DE TROFÉUS (4ª Coluna)
                        let trofeusTexto = colunas[3] ? colunas[3].replace(/"/g, '').trim() : '0';
                        let qtdTrofeus = parseInt(trofeusTexto);
                        if (isNaN(qtdTrofeus)) qtdTrofeus = 0;

                        let blocoDestino = blocoPlano.includes('manha') ? 'manha' : 'tarde';
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino, qtdTrofeus);
                        }
                    }
                }

                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 300);

            } catch (err) { console.error("Erro:", err); }
        }

        function renderizarTurma(nome, valor, bloco, trofeus) {
            const box = document.getElementById('box-' + bloco);
            if (!box) return;
            
            let corBarra = valor >= 95 ? 'bg-[#16a34a]' : (valor >= 90 ? 'bg-[#eab308]' : 'bg-[#dc2626]');
            let corTexto = valor >= 95 ? 'text-[#16a34a]' : (valor >= 90 ? 'text-[#eab308]' : 'text-[#dc2626]');
            let emoji = valor >= 95 ? '👏' : (valor >= 90 ? '👍' : '✋');
            
            let valorFormatado = Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

            // Efeito Especial se bater a meta (95% ou mais)
            let classeDestaqueCard = valor >= 95 
                ? 'border-4 border-yellow-400 bg-yellow-50 shadow-[0_0_15px_rgba(250,204,21,0.3)] transform hover:scale-[1.03]' 
                : 'border border-gray-100 bg-white shadow-md hover:scale-[1.02]';

            // Desenha os trofeus na tela multiplicando o emoji
            let stringTrofeus = trofeus > 0 ? '🏆'.repeat(trofeus) : '';

            box.innerHTML += `
                <div class="p-4 rounded-xl flex flex-col justify-between transition-all duration-300 ${classeDestaqueCard}">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex flex-col">
                            <span class="font-black text-gray-800 text-base md:text-lg xl:text-xl uppercase tracking-tighter pr-2">${nome}</span>
                            <span class="text-sm tracking-[0.2em] mt-1">${stringTrofeus}</span>
                        </div>
                        <span class="text-2xl">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-3xl md:text-4xl xl:text-5xl mb-2 mt-2">
                        ${valorFormatado}%
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div class="barra-frequencia ${corBarra} h-full rounded-full" data-width="${valor > 100 ? 100 : valor}"></div>
                    </div>
                </div>`;
        }

        window.onload = carregarDados;
        setInterval(carregarDados, 900000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .barra-frequencia { transition: width 1.5s cubic-bezier(0.1, 1, 0.1, 1); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; width: 0%; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; position: relative; 
            background: url('bandeiras.png') no-repeat center center fixed;
            background-size: cover;
        }
        
        .overlay-fundo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.88); z-index: -1;
        }
        
        .pagina-slide { display: none; animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pagina-slide.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .card-turma { border-left-width: 12px; min-height: 135px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes subirPodio { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }
        .animar-podio-bloco { animation: subirPodio 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        #barra-tempo { height: 4px; background: linear-gradient(90deg, #3b82f6, #6366f1); width: 0%; position: absolute; top: 0; left: 0; transition: width 9000ms linear; }
        
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 30px; height: 260px; margin-bottom: 20px; width: 100%; }
        .podium-item { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 240px; border-radius: 24px 24px 12px 24px; padding: 20px 15px; text-align: center; border: 1px solid rgba(255,255,255,0.5); }
        .btn-ctrl { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); color: #1e3a8a; border-radius: 50%; width: 42px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.9); transition: all 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-ctrl:hover { background: #1e3a8a; color: white; transform: scale(1.1); }
        ::-webkit-scrollbar { display: none; }
        .loading-spinner { border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans flex flex-col antialiased text-slate-800">

    <div class="overlay-fundo"></div>

    <header class="bg-white/80 backdrop-blur-md px-10 py-3 shadow-sm border-b border-slate-200/50 flex justify-between items-center shrink-0 z-10 mx-6 mt-4 rounded-2xl">
        <div class="flex items-center gap-5">
            <img src="nucleo.png" alt="NRE" class="h-12 object-contain filter drop-shadow-sm" onerror="this.style.display='none'">
            <div class="h-10 w-[2px] bg-slate-300/60"></div>
            <img src="Design sem nome (1) (1).jpg" alt="CCM Anchieta" class="h-16 object-contain rounded-xl shadow-sm border border-white" onerror="this.style.display='none'">
        </div>
        <div class="text-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-900 to-indigo-950 bg-clip-text text-transparent uppercase leading-none tracking-tight">CCM ANCHIETA</h1>
            <p id="info-semana-detalhada" class="text-indigo-600 font-extrabold text-sm tracking-wider mt-1 uppercase">Carregando dados...</p>
        </div>
        <div class="text-right flex items-center gap-4">
            <button onclick="forçarAberturaSorteio()" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-extrabold text-xs px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 hover:scale-[1.03] active:scale-[0.98] transition-all uppercase tracking-wider border border-white/20">
                🎁 Realizar Sorteio
            </button>
            <div class="h-10 w-[1px] bg-slate-300/60"></div>
            <div class="text-left">
                <p id="indicador-pagina" class="text-blue-900 font-black text-xs uppercase bg-blue-100/90 backdrop-blur-sm px-4 py-1 rounded-full mb-0.5 tracking-wider border border-blue-200/50">Carregando...</p>
                <p class="text-slate-500 font-bold text-[9px] uppercase tracking-widest pl-2">Cruzeiro do Oeste - PR</p>
            </div>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-6 w-full max-w-[1850px] mx-auto overflow-hidden z-10 flex items-center justify-center text-center">
        <div class="text-center">
            <div class="loading-spinner"></div>
            <p class="text-slate-600 font-bold text-lg mt-4">Carregando dados da planilha...</p>
        </div>
    </main>

    <div class="relative shrink-0 mx-6 mb-4 rounded-2xl overflow-hidden shadow-sm border border-slate-200/30">
        <div id="barra-tempo"></div>
        <footer class="w-full bg-slate-900/90 backdrop-blur-md text-white p-3.5 flex justify-between items-center px-12 text-xs font-bold uppercase tracking-wider z-50">
            <div class="flex gap-8 items-center text-[11px] font-extrabold">
                <div class="flex items-center gap-2 bg-rose-500/10 text-rose-300 px-3 py-1 rounded-lg border border-rose-500/20"><span>✋</span> < 90%</div>
                <div class="flex items-center gap-2 bg-amber-500/10 text-amber-300 px-3 py-1 rounded-lg border border-amber-500/20"><span>👍</span> 90-95%</div>
                <div class="flex items-center gap-2 bg-emerald-500/10 text-emerald-300 px-3 py-1 rounded-lg border border-emerald-500/20"><span>👏</span> > 95%</div>
            </div>
            
            <div class="flex gap-4 items-center bg-white/10 px-5 py-1.5 rounded-full border border-white/10">
                <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
                <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
                <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
            </div>
            
            <div class="flex items-center gap-4 font-black tracking-widest text-[10px] text-slate-300">
                <span>FREQUENCIÔMETRO DIGITAL</span>
                <img src="criancas.png" alt="Estudantes" class="h-8 object-contain opacity-90 filter drop-shadow" onerror="this.style.display='none'">
            </div>
        </footer>
    </div>

    <script>
        // ============================================
        // SEU LINK DA PLANILHA PUBLICADA
        // ============================================
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlfXs3ZlGbJoyVAQxdJd32Kx2ahdPlO0_Kv0pqCsCs6BAJwLOkjqVdA4txmHISIpswwTXfhg6YFSrc/pub?output=csv";
        
        // Para outras abas, use o mesmo link base mas com gid diferente
        const LINK_ALUNOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlfXs3ZlGbJoyVAQxdJd32Kx2ahdPlO0_Kv0pqCsCs6BAJwLOkjqVdA4txmHISIpswwTXfhg6YFSrc/pub?gid=6658576&output=csv";
        const LINK_HISTORICO = "https://docs.google.com/spreadsheets/d/1PiaejhJaR2-zDCHiq5ffu46DolWi5Dv6MMIN-p8TOqI/pub?gid=2003914330&output=csv";

        let todasTurmas = [], todosAlunos = [], historicoEscola = [], indexSlide = 0, loopInterval = null, isPaused = false, tempoSlideMs = 9000, tInicioSlide = 0, tRestante = 9000, animBarra = null, timersPagina = [], sorteioEmAndamento = false, mediaGeralEscolaGlobal = 0;

        function obterCoresPorValor(valor) {
            if (valor >= 95) return { hex: "#10b981", tailwindTxt: "text-emerald-500", shadow: "rgba(16,185,129,0.25)" };
            if (valor >= 90) return { hex: "#f59e0b", tailwindTxt: "text-amber-500", shadow: "rgba(245,158,11,0.25)" };
            return { hex: "#e11d48", tailwindTxt: "text-rose-500", shadow: "rgba(225,29,72,0.25)" };
        }

        function atualizarTextoSemana() {
            const hoje = new Date(); const inicioAnoLetivo = new Date(2026, 1, 2); 
            const diaSemanaHoje = hoje.getDay(); const diferencaSegunda = hoje.getDate() - (diaSemanaHoje === 0 ? 6 : diaSemanaHoje - 1);
            const segundaFeira = new Date(new Date(hoje).setDate(diferencaSegunda)); const domingo = new Date(new Date(segundaFeira).setDate(segundaFeira.getDate() + 6));
            const diferencaTempo = segundaFeira.getTime() - inicioAnoLetivo.getTime(); const numSem = Math.floor(diferencaTempo / (7 * 24 * 60 * 60 * 1000)) + 1;
            const fmt = (d) => d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            document.getElementById("info-semana-detalhada").innerText = `Estatísticas da Semana ${numSem} • ${fmt(segundaFeira)} a ${fmt(domingo)}`;
        }

        function animarBarraECounter(idCard, valorFinal, tempoCustomizado) {
            const cardElement = document.getElementById(`card-${idCard}`);
            const barraElement = document.getElementById(`barra-${idCard}`);
            let valorAtual = 0; let tempoTotalEstimado = tempoCustomizado || 4500; let tempoInicio = null;

            function executarSubida(timestamp) {
                if (!tempoInicio) tempoInicio = timestamp;
                let tempoDecorrido = timestamp - tempoInicio;
                let tNorm = tempoDecorrido / tempoTotalEstimado;
                let fatorCurva = 1 - Math.pow(1 - Math.min(tNorm, 1), 4); 
                valorAtual = fatorCurva * valorFinal;

                if (tNorm >= 1 || valorAtual >= valorFinal) { valorAtual = valorFinal; }
                const coresDinamicas = obterCoresPorValor(valorAtual);

                if (barraElement) {
                    barraElement.innerText = valorAtual.toFixed(1) + "%";
                    barraElement.style.width = Math.min(valorAtual, 100) + "%";
                    barraElement.style.backgroundColor = coresDinamicas.hex;
                }
                if (cardElement) {
                    if (cardElement.classList.contains('card-turma')) cardElement.style.borderColor = coresDinamicas.hex;
                    const txtContador = cardElement.querySelector('.num-contador-txt');
                    if (txtContador) {
                        txtContador.innerText = valorAtual.toFixed(1) + "%";
                        txtContador.className = `text-5xl font-black text-center num-contador-txt ${coresDinamicas.tailwindTxt}`;
                    }
                }
                if (tNorm < 1 && valorAtual < valorFinal) { window.requestAnimationFrame(executarSubida); }
            }
            window.requestAnimationFrame(executarSubida);
        }

        async function carregarDados() {
            try {
                console.log("🚀 Carregando dados...");
                console.log("📡 Link:", LINK_PLANILHA);
                
                const res = await fetch(LINK_PLANILHA);
                console.log("📡 Status:", res.status);
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const txt = await res.text();
                console.log("📄 Dados recebidos:", txt.substring(0, 200));
                
                const linhas = txt.split(/\r?\n/);
                console.log(`📊 Linhas: ${linhas.length}`);
                
                todasTurmas = [];
                for (let i = 1; i < linhas.length; i++) {
                    if (linhas[i].trim().length < 4) continue;
                    
                    const cols = linhas[i].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                    console.log(`Linha ${i}:`, cols);
                    
                    if (cols.length >= 2) {
                        const nome = cols[0]; 
                        const freq = parseFloat(cols[1].replace(",", "."));
                        const turno = cols[2] ? cols[2].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        
                        if (!isNaN(freq) && nome.length > 0) {
                            todasTurmas.push({ 
                                nome: nome, 
                                valor: freq, 
                                bloco: turno.includes("man") ? "manha" : "tarde", 
                                trofeus: trof 
                            });
                            console.log(`✅ ${nome}: ${freq}%`);
                        }
                    }
                }
                
                console.log(`🎯 Total turmas: ${todasTurmas.length}`);
                
                if (todasTurmas.length === 0) {
                    throw new Error("Nenhuma turma encontrada na planilha");
                }
                
                // Tentar carregar histórico (opcional)
                try {
                    const resHist = await fetch(LINK_HISTORICO);
                    if (resHist.ok) {
                        const txtHist = await resHist.text();
                        const linhasHist = txtHist.split(/\r?\n/);
                        historicoEscola = [];
                        for(let k = 1; k < linhasHist.length; k++) {
                            if (linhasHist[k].trim().length < 3) continue;
                            const colsH = linhasHist[k].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                            if(colsH.length >= 2) {
                                let semNome = colsH[0];
                                const medVal = parseFloat(colsH[1].replace(",", "."));
                                if(!isNaN(medVal)) historicoEscola.push({ semana: semNome, media: medVal });
                            }
                        }
                        console.log(`📈 Histórico: ${historicoEscola.length} semanas`);
                    }
                } catch(e) {}
                
                // Tentar carregar alunos (opcional)
                try {
                    const resAlunos = await fetch(LINK_ALUNOS);
                    if (resAlunos.ok) {
                        const txtAlunos = await resAlunos.text();
                        const linhasAlunos = txtAlunos.split(/\r?\n/);
                        todosAlunos = [];
                        for (let j = 1; j < linhasAlunos.length; j++) {
                            if (linhasAlunos[j].trim().length < 3) continue;
                            const colsA = linhasAlunos[j].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                            if (colsA.length >= 2) todosAlunos.push({ nome: colsA[0], turma: colsA[1] });
                        }
                        console.log(`👥 Alunos: ${todosAlunos.length}`);
                    }
                } catch(e) {}
                
                mediaGeralEscolaGlobal = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
                console.log(`📊 Média geral: ${mediaGeralEscolaGlobal.toFixed(2)}%`);
                
                atualizarTextoSemana(); 
                gerarSlides();
                
            } catch (err) {
                console.error("❌ ERRO:", err);
                document.getElementById("container-slides").innerHTML = `
                    <div style="background: #fee2e2; padding: 30px; border-radius: 16px; text-align: center;">
                        <h2 style="color: #991b1b; font-size: 24px; margin-bottom: 10px;">⚠️ Erro ao carregar</h2>
                        <p style="color: #991b1b;">${err.message}</p>
                        <button onclick="location.reload()" style="margin-top: 15px; background: #dc2626; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                            🔄 Tentar novamente
                        </button>
                    </div>`;
            }
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            
            const manha = todasTurmas.filter(t => t.bloco === "manha");
            const tarde = todasTurmas.filter(t => t.bloco === "tarde");
            let idGlobal = 0;

            console.log(`📋 Slides: ${manha.length} manhã, ${tarde.length} tarde`);

            if (manha.length > 0) {
                idGlobal = montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600/90", idGlobal);
                idGlobal = montarSlideRanking(manha, "RANKING - MANHÃ", "bg-blue-600/90", idGlobal);
            }
            if (tarde.length > 0) {
                idGlobal = montarPaginas(tarde, "TURNO TARDE", "bg-blue-950/90", idGlobal);
                idGlobal = montarSlideRanking(tarde, "RANKING - TARDE", "bg-blue-950/90", idGlobal);
            }

            // Se não encontrou turnos, mostra tudo junto
            if (manha.length === 0 && tarde.length === 0) {
                idGlobal = montarPaginas(todasTurmas, "TODAS AS TURMAS", "bg-indigo-600/90", idGlobal);
            }

            // Disputa entre turnos
            if (manha.length > 0 && tarde.length > 0) {
                const medManha = manha.reduce((acc, t) => acc + t.valor, 0) / manha.length;
                const medTarde = tarde.reduce((acc, t) => acc + t.valor, 0) / tarde.length;
                
                idGlobal++; let idM = idGlobal; idGlobal++; let idT = idGlobal;

                const tSlide = document.createElement("div");
                tSlide.className = "pagina-slide w-full h-full slide-tipo-disputa";
                tSlide.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full gap-8">
                        <div class="bg-slate-800/90 text-white py-3 px-16 rounded-2xl font-black text-2xl uppercase shadow-lg">⚔️ DISPUTA ENTRE TURNOS ⚔️</div>
                        <div class="grid grid-cols-2 gap-12 w-full max-w-5xl">
                            <div id="card-${idM}" data-id="${idM}" data-target="${medManha}" class="glass-card p-10 rounded-[2.5rem] card-bloco-media border-t-8 border-blue-500 text-center">
                                <h3 class="text-2xl font-extrabold text-blue-700 uppercase mb-2">Média Manhã</h3>
                                <div class="text-7xl font-black text-blue-600 num-contador-txt">0.0%</div>
                            </div>
                            <div id="card-${idT}" data-id="${idT}" data-target="${medTarde}" class="glass-card p-10 rounded-[2.5rem] card-bloco-media border-t-8 border-indigo-500 text-center">
                                <h3 class="text-2xl font-extrabold text-indigo-700 uppercase mb-2">Média Tarde</h3>
                                <div class="text-7xl font-black text-indigo-600 num-contador-txt">0.0%</div>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(tSlide);
            }

            // Slide Missão
            const metaOuro = 95.0; 
            const faltaParaMeta = Math.max(metaOuro - mediaGeralEscolaGlobal, 0);
            const msgMissao = faltaParaMeta > 0 ? 
                `FALTAM <span class="text-rose-600 font-black">${faltaParaMeta.toFixed(1)}%</span> PARA A META!` : 
                `🎉 META ATINGIDA! 🎉`;

            idGlobal++; let idEscola = idGlobal;
            const mSlide = document.createElement("div");
            mSlide.className = "pagina-slide w-full h-full p-6 slide-tipo-desafio-full";
            mSlide.innerHTML = `
                <div class="h-full flex flex-col gap-6 items-center justify-center max-w-6xl mx-auto">
                    <div class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white py-4 px-12 rounded-2xl font-black text-3xl uppercase shadow-xl">🚀 Missão Coletiva Anchieta</div>
                    <div class="grid grid-cols-3 gap-6 w-full">
                        <div id="card-${idEscola}" data-id="${idEscola}" data-target="${mediaGeralEscolaGlobal}" class="glass-card p-6 rounded-2xl text-center border-b-8 border-indigo-500 card-bloco-media">
                            <p class="text-slate-500 font-extrabold uppercase text-xs mb-1">Média Geral</p>
                            <p class="text-5xl font-black text-indigo-700 num-contador-txt">0.0%</p>
                        </div>
                        <div class="glass-card p-6 rounded-2xl text-center border-b-8 border-emerald-500">
                            <p class="text-slate-500 font-extrabold uppercase text-xs mb-1">Meta Ouro</p>
                            <p class="text-5xl font-black text-emerald-600">95.0%</p>
                        </div>
                        <div class="glass-card p-6 rounded-2xl text-center border-b-8 border-rose-500 flex flex-col justify-center">
                            <p class="text-2xl font-black text-slate-700 uppercase">${msgMissao}</p>
                        </div>
                    </div>
                </div>`;
            container.appendChild(mSlide);

            // Top 5
            const top5 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 5);
            if (top5.length > 0) {
                const gSlide = document.createElement("div");
                gSlide.className = "pagina-slide w-full h-full pt-4 slide-tipo-top5";
                gSlide.innerHTML = `
                    <div class="flex flex-col h-full items-center justify-center max-w-4xl mx-auto">
                        <div class="bg-gradient-to-r from-amber-500 to-amber-600 text-white py-3 px-20 rounded-2xl font-black text-2xl mb-6 shadow-lg uppercase">🏆 TOP 5 GERAL 🏆</div>
                        <div class="w-full flex flex-col gap-4">
                            ${top5.map((t, idx) => {
                                const medalhas = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣']; 
                                idGlobal++;
                                return `
                                    <div id="card-${idGlobal}" data-id="${idGlobal}" data-target="${t.valor}" class="linha-top5 flex justify-between items-center glass-card border-l-[12px] border-l-rose-500 px-8 py-4 rounded-2xl shadow-sm opacity-0 transform translate-y-4 transition-all duration-500">
                                        <div class="flex items-center gap-6">
                                            <span class="text-4xl">${medalhas[idx]}</span>
                                            <span class="font-black text-2xl text-slate-800 uppercase">${t.nome}</span>
                                        </div>
                                        <span class="font-black text-3xl num-contador-txt text-rose-500">0.0%</span>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(gSlide);
            }

            iniciarAnimacao();
        }

        function montarPaginas(lista, titulo, col, idStart) {
            const container = document.getElementById("container-slides");
            let localId = idStart;
            
            for (let i = 0; i < lista.length; i += 6) {
                const pedaco = lista.slice(i, i + 6);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full pt-2 slide-tipo-lista";

                slide.innerHTML = `
                    <div class="flex flex-col items-center h-full max-w-[1800px] mx-auto">
                        <div class="${col} text-white py-2 px-12 rounded-2xl font-black text-xl mb-4 shadow-md uppercase tracking-wider">
                            ${titulo} ${lista.length > 6 ? `(${i+1}-${Math.min(i+6, lista.length)} de ${lista.length})` : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-4 w-full h-full">
                            ${pedaco.map(t => { 
                                localId++;
                                return `
                                    <div id="card-${localId}" data-id="${localId}" data-target="${t.valor}" class="p-4 rounded-[2rem] card-turma glass-card text-left flex flex-col justify-between border-l-rose-500">
                                        <div class="flex justify-between items-center mb-1">
                                            <p class="font-black text-slate-900 text-xl md:text-2xl uppercase truncate max-w-[75%]">${t.nome}</p>
                                            <p class="text-lg">${t.trofeus > 0 ? "🏆".repeat(Math.min(t.trofeus, 5)) : ""}</p>
                                        </div>
                                        <div class="w-full bg-slate-200/50 rounded-xl h-10 overflow-hidden relative shadow-inner flex items-center">
                                            <div id="barra-${localId}" class="barra-frequencia h-full text-lg bg-rose-500" style="width: 0%">0.0%</div>
                                        </div>
                                    </div>`; 
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(slide);
            }
            return localId;
        }

        function montarSlideRanking(listaTurno, titulo, col, idStart) {
            const container = document.getElementById("container-slides");
            const ordenadas = [...listaTurno].sort((a, b) => b.valor - a.valor);
            const top3 = ordenadas.slice(0, 3);
            
            if (top3.length < 1) return idStart;

            let localId = idStart; 
            const slide = document.createElement("div");
            slide.className = "pagina-slide w-full h-full pt-2 slide-tipo-ranking";
            
            localId++; let idPod1 = localId; localId++; let idPod2 = localId; localId++; let idPod3 = localId;

            slide.innerHTML = `
                <div class="flex flex-col h-full items-center justify-start max-w-5xl mx-auto">
                    <div class="${col} text-white py-2 px-14 rounded-2xl font-black text-xl mb-4 shadow-md uppercase tracking-wide">${titulo}</div>
                    <div class="podium-container shrink-0">
                        ${top3[1] ? `<div id="card-${idPod2}" data-id="${idPod2}" data-target="${top3[1].valor}" class="podium-item glass-card border-b-[6px] border-slate-400 shadow-xl order-1 h-[85%] pod-prata opacity-0">
                            <span class="text-4xl mb-1">🥈</span>
                            <p class="text-slate-800 font-black text-lg uppercase">${top3[1].nome}</p>
                            <span class="text-4xl font-black text-rose-500 mt-2 num-contador-txt">0.0%</span>
                        </div>` : ''}
                        ${top3[0] ? `<div id="card-${idPod1}" data-id="${idPod1}" data-target="${top3[0].valor}" class="podium-item glass-card border-b-[6px] border-amber-400 shadow-2xl order-2 h-[100%] scale-105 pod-ouro opacity-0">
                            <span class="text-5xl mb-1">🥇</span>
                            <p class="text-blue-950 font-black text-xl uppercase">${top3[0].nome}</p>
                            <span class="text-5xl font-black text-rose-600 mt-2 num-contador-txt">0.0%</span>
                        </div>` : ''}
                        ${top3[2] ? `<div id="card-${idPod3}" data-id="${idPod3}" data-target="${top3[2].valor}" class="podium-item glass-card border-b-[6px] border-orange-400 shadow-xl order-3 h-[70%] pod-bronze opacity-0">
                            <span class="text-4xl mb-1">🥉</span>
                            <p class="text-amber-900 font-black text-lg uppercase">${top3[2].nome}</p>
                            <span class="text-4xl font-black text-rose-600 mt-2 num-contador-txt">0.0%</span>
                        </div>` : ''}
                    </div>
                </div>`;
            container.appendChild(slide);
            return localId;
        }

        function iniciarAnimacao() {
            if (loopInterval) clearTimeout(loopInterval);
            cancelAnimationFrame(animBarra);
            timersPagina.forEach(t => clearTimeout(t)); 
            timersPagina = [];

            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            
            indexSlide = 0; 
            slides[indexSlide].classList.add('active');
            document.getElementById("indicador-pagina").innerText = `Pág. 1 de ${slides.length}`;
            
            animarSlideAtual();
            
            tRestante = tempoSlideMs; 
            tInicioSlide = Date.now();
            
            if (!isPaused) {
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempo();
            }
        }

        function animarSlideAtual() {
            const slides = document.querySelectorAll(".pagina-slide");
            const currentSlide = slides[indexSlide];
            
            if (currentSlide.classList.contains('slide-tipo-lista')) {
                currentSlide.querySelectorAll('.card-turma').forEach(el => {
                    animarBarraECounter(el.dataset.id, parseFloat(el.dataset.target), 5000);
                });
            } else if (currentSlide.classList.contains('slide-tipo-desafio-full') || 
                       currentSlide.classList.contains('slide-tipo-disputa')) {
                currentSlide.querySelectorAll('.card-bloco-media').forEach(el => {
                    animarBarraECounter(el.dataset.id, parseFloat(el.dataset.target), 5000);
                });
            } else if (currentSlide.classList.contains('slide-tipo-top5')) {
                const lines = currentSlide.querySelectorAll('.linha-top5');
                lines.forEach((l, idx) => {
                    setTimeout(() => {
                        l.style.opacity = "1";
                        l.style.transform = "translateY(0)";
                        animarBarraECounter(l.dataset.id, parseFloat(l.dataset.target), 2500);
                    }, idx * 250);
                });
            } else if (currentSlide.classList.contains('slide-tipo-ranking')) {
                const pod3 = currentSlide.querySelector('.pod-bronze');
                const pod2 = currentSlide.querySelector('.pod-prata');
                const pod1 = currentSlide.querySelector('.pod-ouro');
                
                if (pod3) setTimeout(() => { 
                    pod3.style.opacity = "1";
                    pod3.style.animation = "subirPodio 0.6s forwards"; 
                    animarBarraECounter(pod3.dataset.id, parseFloat(pod3.dataset.target), 2000); 
                }, 300);
                
                if (pod2) setTimeout(() => { 
                    pod2.style.opacity = "1";
                    pod2.style.animation = "subirPodio 0.6s forwards"; 
                    animarBarraECounter(pod2.dataset.id, parseFloat(pod2.dataset.target), 2000); 
                }, 800);
                
                if (pod1) setTimeout(() => { 
                    pod1.style.opacity = "1";
                    pod1.style.animation = "subirPodio 0.6s forwards"; 
                    animarBarraECounter(pod1.dataset.id, parseFloat(pod1.dataset.target), 2000); 
                }, 1300);
            }
        }

        function mudarSlide(direcao) {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length <= 1) return;
            
            timersPagina.forEach(t => clearTimeout(t)); 
            timersPagina = [];
            
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            
            document.getElementById("indicador-pagina").innerText = `Pág. ${indexSlide + 1} de ${slides.length}`;
            
            animarSlideAtual();
            
            tRestante = tempoSlideMs; 
            tInicioSlide = Date.now();
            
            if (!isPaused) {
                clearTimeout(loopInterval); 
                cancelAnimationFrame(animBarra);
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempo();
            }
        }

        function atualizarBarraTempo() {
            cancelAnimationFrame(animBarra);
            function animar() {
                const decorrido = Date.now() - tInicioSlide;
                const progresso = Math.min((decorrido / tRestante) * 100, 100);
                document.getElementById('barra-tempo').style.width = progresso + '%';
                if (progresso < 100 && !isPaused) {
                    animBarra = requestAnimationFrame(animar);
                }
            }
            animar();
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            
            if (isPaused) {
                clearTimeout(loopInterval);
                cancelAnimationFrame(animBarra);
                const decorrido = Date.now() - tInicioSlide;
                tRestante = Math.max(tempoSlideMs - decorrido, 0);
            } else {
                tInicioSlide = Date.now();
                loopInterval = setTimeout(() => mudarSlide(1), tRestante);
                atualizarBarraTempo();
            }
        }

        function forçarAberturaSorteio() {
            alert("🎁 Função de sorteio disponível em breve!");
        }

        window.onload = function() {
            console.log("🟢 Página carregada!");
            console.log("🔗 Usando link:", LINK_PLANILHA);
            carregarDados();
        };
    </script>
</body>

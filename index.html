<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        .fundo-quadriculado {
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-8 font-sans min-h-screen fundo-quadriculado">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl border-4 border-blue-900 overflow-hidden">
        
        <header class="p-6 border-b-2 border-gray-100 flex flex-col md:flex-row items-center bg-white relative">
            
            <div class="flex-shrink-0 mb-4 md:mb-0 md:mr-6">
                <img src="logo.jpeg" alt="Brasão CCM Anchieta" class="w-32 h-32 md:w-40 md:h-40 rounded-full shadow-xl border-4 border-blue-900 object-contain bg-white">
            </div>
            
            <div class="text-center md:text-left flex-grow">
                <h1 class="text-2xl md:text-4xl font-black text-gray-800 uppercase leading-tight">Colégio Estadual <br>Cívico Militar Anchieta</h1>
                <p class="text-blue-700 font-bold tracking-[0.2em] mt-2 text-xl italic uppercase">Painel de Frequência</p>
                <p class="text-gray-400 font-bold text-xs mt-1 uppercase">Cruzeiro do Oeste - PR</p>
            </div>

            <div class="flex flex-col items-center md:items-end mt-6 md:mt-0 gap-2 text-right">
                <button onclick="carregarDados()" class="bg-blue-900 hover:bg-blue-800 text-white text-[10px] font-bold py-3 px-8 rounded-full shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                    🔄 Atualizar Dados
                </button>
                <p id="data-exibicao" class="text-blue-900 font-black text-sm"></p>
            </div>
        </header>

        <main class="p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="flex flex-col gap-4">
                <h3 class="bg-orange-500 text-white text-center font-black py-4 rounded-2xl shadow-lg uppercase text-xl">Manhã 1</h3>
                <div id="box-manha1" class="space-y-4 min-h-[100px]"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h3 class="bg-cyan-500 text-white text-center font-black py-4 rounded-2xl shadow-lg uppercase text-xl">Manhã 2</h3>
                <div id="box-manha2" class="space-y-4 min-h-[100px]"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h3 class="bg-green-600 text-white text-center font-black py-4 rounded-2xl shadow-lg uppercase text-xl">Tarde</h3>
                <div id="box-tarde" class="space-y-4 min-h-[100px]"></div>
            </div>
        </main>

        <footer class="bg-gray-50 p-6 border-t flex flex-wrap justify-around gap-6 text-[10px] md:text-xs font-black uppercase">
            <div class="flex items-center gap-3 text-red-600 px-4 py-2 bg-white rounded-lg border border-red-100 shadow-sm">
                <span class="text-xl md:text-2xl">😡</span> ABAIXO DE 89,9%
            </div>
            <div class="flex items-center gap-3 text-yellow-600 px-4 py-2 bg-white rounded-lg border border-yellow-100 shadow-sm">
                <span class="text-xl md:text-2xl">😐</span> 90,0% A 94,9%
            </div>
            <div class="flex items-center gap-3 text-green-700 px-4 py-2 bg-white rounded-lg border border-green-100 shadow-sm">
                <span class="text-xl md:text-2xl">😊</span> ACIMA DE 95,0%
            </div>
        </footer>
    </div>

    <script>
        // SEU NOVO LINK DA PLANILHA PUBLICADA
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                // Cache busting para garantir dados sempre novos
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                // Limpa os containers antes de preencher
                ['manha1', 'manha2', 'tarde'].forEach(id => {
                    document.getElementById('box-' + id).innerHTML = '';
                });

                const linhas = csvStr.split(/\r?\n/);

                // Pula a linha de títulos (Linha 1)
                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    // Suporta separador ; ou ,
                    const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoDestino = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino);
                        }
                    }
                }

                // Dispara animação
                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 500);

            } catch (err) { console.error("Erro na leitura da planilha:", err); }
        }

        function renderizarTurma(nome, valor, bloco) {
            const box = document.getElementById('box-' + bloco) || document.getElementById('box-tarde');
            
            // Regras de Cores
            let cor = valor >= 95 ? 'bg-green-500' : (valor >= 90 ? 'bg-yellow-500' : 'bg-red-500');
            let txt = valor >= 95 ? 'text-green-700' : (valor >= 90 ? 'text-yellow-600' : 'text-red-700');
            let emoji = valor >= 95 ? '😊' : (valor >= 90 ? '😐' : '😡');

            box.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-md transition-transform hover:scale-105 border-l-8 ${valor >= 95 ? 'border-green-500' : (valor >= 90 ? 'border-yellow-500' : 'border-red-500')}">
                    <div class="flex justify-between items-start mb-2 font-black text-gray-700 uppercase">
                        <span class="text-[10px] md:text-xs leading-tight pr-2 flex-grow">${nome}</span>
                        <span class="${txt} text-sm whitespace-nowrap">${valor.toFixed(1).replace('.', ',')}% ${emoji}</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden border border-gray-100 shadow-inner">
                        <div class="barra-frequencia ${cor} h-full rounded-full" data-width="${valor}"></div>
                    </div>
                </div>`;
        }

        // Data atualizada
        document.getElementById('data-exibicao').innerText = new Date().toLocaleDateString('pt-BR', {month: 'long', year: 'numeric'}).toUpperCase();
        window.onload = carregarDados;
    </script>
</body>
</html>

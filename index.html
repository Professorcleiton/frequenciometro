<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        
        body { 
            background-color: #f1f5f9; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            overflow: hidden; position: relative; 
        }
        .fundo-textura { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('LogoA.png'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            opacity: 0.05; z-index: -1; pointer-events: none; 
        }

        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card-turma { border-left-width: 16px; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        /* Controles Centralizados */
        .controles-painel { 
            position: fixed; 
            bottom: 80px; /* Um pouco acima do rodapé */
            left: 50%;
            transform: translateX(-50%);
            z-index: 100; 
            display: flex; 
            gap: 20px;
            background: rgba(15, 23, 42, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }
        .btn-ctrl { 
            background: #1e3a8a; color: white; border-radius: 50%; 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 2px solid rgba(255,255,255,0.3); font-size: 1.2rem;
            transition: all 0.2s;
        }
        .btn-ctrl:hover { background: #2563eb; transform: scale(1.1); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col">

    <div class="fundo-textura"></div>

    <div class="controles-painel">
        <div class="btn-ctrl" onclick="mudarSlide(-1)" title="Anterior">⬅️</div>
        <div id="btn-pause" class="btn-ctrl" onclick="togglePause()" title="Pausar/Play">⏸️</div>
        <div class="btn-ctrl" onclick="mudarSlide(1)" title="Próximo">➡️</div>
    </div>

    <header class="bg-white/95 px-8 py-2 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <img src="nucleo.png" alt="NRE" class="h-14 object-contain">
            <img src="LogoA.png" alt="CCM Anchieta" class="h-24 object-contain">
        </div>

        <div class="text-center flex-grow">
            <h1 class="text-3xl font-black text-[#1e3a8a] uppercase leading-none tracking-tighter">CCM ANCHIETA</h1>
            <p id="info-semana-detalhada" class="text-blue-700 font-bold text-lg mt-1 bg-blue-50 px-6 py-1 rounded-full inline-block border border-blue-100">
                Calculando semana...
            </p>
        </div>

        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-100 px-4 py-1 rounded-full mb-1">Sincronizando...</p>
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 w-full max-w-[1850px] mx-auto overflow-hidden z-10 flex items-center justify-center">
        </main>

    <footer class="w-full bg-[#0f172a] text-white p-2 flex justify-between items-center px-16 text-xs font-black uppercase tracking-widest shrink-0 z-10">
        <div class="flex gap-12">
            <div class="flex items-center gap-3"><span>✋</span> < 90%</div>
            <div class="flex items-center gap-3"><span>👍</span> 90-95%</div>
            <div class="flex items-center gap-3"><span>👏</span> > 95%</div>
        </div>
        <img src="criancas.png" alt="Estudantes" class="h-12 object-contain">
    </footer>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;

        // Função para obter o número da semana e o intervalo de datas
        function atualizarTextoSemana() {
            const agora = new Date();
            
            // Número da Semana
            const inicioAno = new Date(agora.getFullYear(), 0, 1);
            const dias = Math.floor((agora - inicioAno) / (24 * 60 * 60 * 1000));
            const numeroSemana = Math.ceil((dias + inicioAno.getDay() + 1) / 7);

            // Intervalo (Segunda a Domingo)
            const diaSemana = agora.getDay(); // 0 (Dom) a 6 (Sab)
            const diffSegunda = agora.getDate() - (diaSemana === 0 ? 6 : diaSemana - 1);
            
            const segunda = new Date(agora.setDate(diffSegunda));
            const domingo = new Date(agora.setDate(segunda.getDate() + 6));

            const formatar = (d) => d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            
            document.getElementById("info-semana-detalhada").innerText = 
                `SEMANA ${numeroSemana} • ${formatar(segunda)} a ${formatar(domingo)}`;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            document.getElementById('btn-pause').style.background = isPaused ? '#10b981' : '#1e3a8a';
            if (isPaused) clearInterval(loopInterval); else iniciarAnimacao();
        }

        function mudarSlide(direcao) {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            if (!isPaused) { clearInterval(loopInterval); iniciarAnimacao(); }
        }

        async function carregarDados() {
            try {
                const response = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim().length > 3);
                todasTurmas = [];
                
                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(",");
                    if (cols.length < 3) cols = linhas[i].split(";");
                    if (cols.length >= 2) {
                        const nome = cols[0].replace(/"/g, "").trim();
                        const freq = parseFloat(cols[1].replace(",", "."));
                        const turno = cols[2]?.toLowerCase() || "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        const historico = cols[4] ? parseFloat(cols[4].replace(",", ".")) : freq;

                        if (!isNaN(freq)) {
                            todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof, historico: historico });
                        }
                    }
                }
                atualizarTextoSemana();
                gerarSlides();
            } catch (err) { console.error(err); }
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            
            const manha = todasTurmas.filter(t => t.bloco.includes("manha"));
            const tarde = todasTurmas.filter(t => t.bloco.includes("tarde"));
            
            if (manha.length > 0) montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600");
            if (tarde.length > 0) montarPaginas(tarde, "TURNO TARDE", "bg-blue-900");

            // Slide Pódio
            const top3 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 3);
            if (top3.length >= 3) {
                const pSlide = document.createElement("div");
                pSlide.className = "pagina-slide w-full h-full pt-6";
                pSlide.innerHTML = `
                    <div class="flex flex-col h-full items-center justify-center">
                        <div class="bg-yellow-500 text-blue-950 py-3 px-20 rounded-full font-black text-4xl mb-8 shadow-xl border-4 border-yellow-200 uppercase">🏆 PODIUM DA SEMANA 🏆</div>
                        <div class="podium-container">
                            <div class="podium-item podium-2 shadow-2xl bg-slate-400 order-1"><span class="text-7xl mb-2">🥈</span><p class="text-white font-black text-2xl uppercase">${top3[1].nome}</p><p class="text-white font-black text-5xl">${top3[1].valor.toFixed(1)}%</p></div>
                            <div class="podium-item podium-1 shadow-2xl bg-yellow-500 order-2 scale-110"><span class="text-8xl mb-2">🥇</span><p class="text-blue-900 font-black text-3xl uppercase">${top3[0].nome}</p>

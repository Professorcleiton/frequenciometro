<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .barra-frequencia { transition: width 1.5s cubic-bezier(0.1, 1, 0.1, 1); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; width: 0%; }
        body { background: radial-gradient(at 0% 0%, #e0e7ff 0px, transparent 50%), radial-gradient(at 100% 100%, #fef3c7 0px, transparent 50%), #f8fafc; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .fundo-textura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('LogoA.png'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.025; z-index: -1; pointer-events: none; }
        
        .pagina-slide { display: none; animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pagina-slide.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03), 0 10px 10px -5px rgba(0, 0, 0, 0.03); }
        .card-turma { border-left-width: 12px; min-height: 135px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes subirPodio { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }
        .animar-podio-bloco { animation: subirPodio 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        #barra-tempo { height: 4px; background: linear-gradient(90deg, #3b82f6, #6366f1); width: 0%; position: absolute; top: 0; left: 0; transition: width 9000ms linear; }
        
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 24px; height: 260px; margin-bottom: 20px; width: 100%; }
        .podium-item { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 220px; border-radius: 24px 24px 12px 24px; padding: 20px 15px; text-align: center; border: 1px solid rgba(255,255,255,0.4); }
        .btn-ctrl { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); color: #1e3a8a; border-radius: 50%; width: 42px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-ctrl:hover { background: #1e3a8a; color: white; transform: scale(1.1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col antialiased text-slate-800">

    <div class="fundo-textura"></div>

    <header class="bg-white/70 backdrop-blur-md px-10 py-3 shadow-sm border-b border-slate-200/50 flex justify-between items-center shrink-0 z-10 mx-6 mt-4 rounded-2xl">
        <div class="flex items-center gap-5">
            <img src="nucleo.png" alt="NRE" class="h-12 object-contain filter drop-shadow-sm">
            <div class="h-10 w-[2px] bg-slate-300/60"></div>
            <img src="Design sem nome (1) (1).jpg" alt="CCM Anchieta" class="h-16 object-contain rounded-xl shadow-sm border border-white">
        </div>
        <div class="text-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-900 to-indigo-950 bg-clip-text text-transparent uppercase leading-none tracking-tight">CCM ANCHIETA</h1>
            <p id="info-semana-detalhada" class="text-indigo-600 font-extrabold text-sm tracking-wider mt-1 uppercase">Sincronizando estatísticas...</p>
        </div>
        <div class="text-right flex items-center gap-4">
            <button onclick="forçarAberturaSorteio()" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-extrabold text-xs px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 hover:scale-[1.03] active:scale-[0.98] transition-all uppercase tracking-wider">
                🎁 Realizar Sorteio
            </button>
            <div class="h-10 w-[1px] bg-slate-300/60"></div>
            <div class="text-left">
                <p id="indicador-pagina" class="text-blue-900 font-black text-xs uppercase bg-blue-100/80 backdrop-blur-sm px-4 py-1 rounded-full mb-0.5 tracking-wider border border-blue-200/50">Carregando...</p>
                <p class="text-slate-400 font-bold text-[9px] uppercase tracking-widest pl-2">Cruzeiro do Oeste - PR</p>
            </div>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-6 w-full max-w-[1850px] mx-auto overflow-hidden z-10 flex items-center justify-center text-center"></main>

    <div class="relative shrink-0 mx-6 mb-4 rounded-2xl overflow-hidden shadow-sm border border-slate-200/30">
        <div id="barra-tempo"></div>
        <footer class="w-full bg-slate-900/95 backdrop-blur-md text-white p-3.5 flex justify-between items-center px-12 text-xs font-bold uppercase tracking-wider z-50">
            <div class="flex gap-8 items-center text-[11px] font-extrabold">
                <div class="flex items-center gap-2 bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg border border-rose-500/20"><span>✋</span> < 90%</div>
                <div class="flex items-center gap-2 bg-amber-500/10 text-amber-400 px-3 py-1 rounded-lg border border-amber-500/20"><span>👍</span> 90-95%</div>
                <div class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-lg border border-emerald-500/20"><span>👏</span> > 95%</div>
            </div>
            
            <div class="flex gap-4 items-center bg-white/10 px-5 py-1.5 rounded-full border border-white/10">
                <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
                <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
                <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
            </div>
            
            <div class="flex items-center gap-4 font-black tracking-widest text-[10px] text-slate-400">
                <span>FREQUENCIÔMETRO DIGITAL</span>
                <img src="criancas.png" alt="Estudantes" class="h-8 object-contain opacity-80 filter drop-shadow">
            </div>
        </footer>
    </div>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        const LINK_ALUNOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=6658576&single=true&output=csv";
        const LINK_HISTORICO = "https://docs.google.com/spreadsheets/d/1PiaejhJaR2-zDCHiq5ffu46DolWi5Dv6MMIN-p8TOqI/export?format=csv&gid=2003914330";

        let todasTurmas = [];
        let todosAlunos = [];
        let historicoEscola = []; 
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;
        let tempoSlideMs = 9000; 
        let tInicioSlide = 0;
        let tRestante = 9000;
        let animBarra = null;
        let timersPagina = []; 
        let sorteioEmAndamento = false;
        let mediaGeralEscolaGlobal = 0;

        function ticarSom(frequenciaHz, duracaoMs) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(frequenciaHz, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duracaoMs/1000);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + duracaoMs/1000);
            } catch(e) {}
        }

        function obterCoresPorValor(valor) {
            if (valor >= 95) return { hex: "#10b981", tailwindTxt: "text-emerald-500", tailwindBorder: "border-emerald-500", shadow: "rgba(16,185,129,0.25)" };
            if (valor >= 90) return { hex: "#f59e0b", tailwindTxt: "text-amber-500", tailwindBorder: "border-amber-500", shadow: "rgba(245,158,11,0.25)" };
            return { hex: "#e11d48", tailwindTxt: "text-rose-500", tailwindBorder: "border-rose-500", shadow: "rgba(225,29,72,0.25)" };
        }

        function atualizarTextoSemana() {
            const hoje = new Date();
            const inicioAnoLetivo = new Date(2026, 1, 2); 
            
            const diaSemanaHoje = hoje.getDay();
            const diferencaSegunda = hoje.getDate() - (diaSemanaHoje === 0 ? 6 : diaSemanaHoje - 1);
            const segundaFeira = new Date(new Date(hoje).setDate(diferencaSegunda));
            const domingo = new Date(new Date(segundaFeira).setDate(segundaFeira.getDate() + 6));
            
            const diferencaTempo = segundaFeira.getTime() - inicioAnoLetivo.getTime();
            const numSem = Math.floor(diferencaTempo / (7 * 24 * 60 * 60 * 1000)) + 1;
            
            const fmt = (d) => d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            document.getElementById("info-semana-detalhada").innerText = `Estatísticas da Semana ${numSem} • ${fmt(segundaFeira)} a ${fmt(domingo)}`;
        }

        function animarBarraECounter(idCard, valorFinal, tempoCustomizado) {
            const cardElement = document.getElementById(`card-${idCard}`);
            const barraElement = document.getElementById(`barra-${idCard}`);
            let valorAtual = 0;
            let tempoTotalEstimado = tempoCustomizado || 4500; 
            let tempoInicio = null;

            function executarSubida(timestamp) {
                if (!tempoInicio) tempoInicio = timestamp;
                let tempoDecorrido = timestamp - tempoInicio;
                let tNorm = tempoDecorrido / tempoTotalEstimado;
                let fatorCurva = 1 - Math.pow(1 - Math.min(tNorm, 1), 4); 
                valorAtual = fatorCurva * valorFinal;

                if (valorAtual >= 88.8 && valorAtual < 90) {
                    let f1 = (tempoDecorrido - (tempoTotalEstimado * 0.3)) / (tempoTotalEstimado * 0.4);
                    valorAtual = 88.8 + (Math.sin(Math.max(0, Math.min(f1, 1)) * Math.PI / 2) * 1.1);
                } else if (valorAtual >= 93.5 && valorAtual < 95) {
                    let f2 = (tempoDecorrido - (tempoTotalEstimado * 0.5)) / (tempoTotalEstimado * 0.4);
                    valorAtual = 93.5 + (Math.sin(Math.max(0, Math.min(f2, 1)) * Math.PI / 2) * 1.4);
                }

                if (tNorm >= 1 || valorAtual >= valorFinal) { valorAtual = valorFinal; }
                const coresDinamicas = obterCoresPorValor(valorAtual);

                if (barraElement) {
                    barraElement.innerText = valorAtual.toFixed(1) + "%";
                    barraElement.style.width = Math.min(valorAtual, 100) + "%";
                    barraElement.style.backgroundColor = coresDinamicas.hex;
                    barraElement.style.boxShadow = `0 0 12px ${coresDinamicas.shadow}`;
                }

                if (cardElement) {
                    if (cardElement.classList.contains('card-turma')) cardElement.style.borderColor = coresDinamicas.hex;
                    const txtContador = cardElement.querySelector('.num-contador-txt');
                    if (txtContador) {
                        txtContador.innerText = valorAtual.toFixed(1) + "%";
                        if(cardElement.classList.contains('podium-item')) {
                            txtContador.className = `text-5xl font-black mt-3 block w-full text-center num-contador-txt ${coresDinamicas.tailwindTxt}`;
                        } else {
                            txtContador.className = `text-5xl font-black num-contador-txt ${coresDinamicas.tailwindTxt}`;
                        }
                    }
                }
                if (tNorm < 1 && valorAtual < valorFinal) { window.requestAnimationFrame(executarSubida); }
            }
            window.requestAnimationFrame(executarSubida);
        }

        // NOVO MOTOR: Gráfico de Barras Elegante e à prova de quebras
        function renderizarGraficoHistorico(idContainer) {
            const wrapper = document.getElementById(idContainer);
            if (!wrapper) return;
            
            if (historicoEscola.length === 0) {
                wrapper.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-4">
                        <span class="text-3xl mb-2 filter grayscale opacity-50">📊</span>
                        <span class="text-slate-500 font-bold text-sm text-center">Gráfico Indisponível</span>
                    </div>`;
                return;
            }

            const largura = 440; 
            const altura = 200; 
            const margemX = 30;
            const margemYBase = 30;

            const frequencias = historicoEscola.map(h => h.media);
            let minF = Math.floor(Math.min(...frequencias, 85)) - 2; 
            let maxF = 100;

            const alturaUtil = altura - margemYBase - 20; 
            const larguraUtil = largura - 2 * margemX;
            const espacoPorBarra = larguraUtil / historicoEscola.length;
            const larguraBarra = Math.min(espacoPorBarra * 0.65, 32); 

            let barrasHtml = ""; 
            let labelsHtml = "";

            historicoEscola.forEach((dado, i) => {
                const x = margemX + (i * espacoPorBarra) + (espacoPorBarra / 2) - (larguraBarra / 2);
                const val = Math.min(Math.max(dado.media, minF), maxF); 
                const hBarra = ((val - minF) / (maxF - minF)) * alturaUtil;
                const yText = altura - margemYBase - hBarra - 6;
                
                const corPonto = obterCoresPorValor(dado.media).hex;

                barrasHtml += `
                    <g class="grupo-barra" style="animation-delay: ${i * 120}ms;">
                        <rect x="${x}" y="${altura - margemYBase - hBarra}" width="${larguraBarra}" height="${hBarra}" fill="${corPonto}" rx="4" opacity="0.9" />
                        <text x="${x + larguraBarra/2}" y="${yText}" fill="${corPonto}" font-size="11" font-weight="900" text-anchor="middle">${dado.media.toFixed(1)}%</text>
                    </g>
                `;
                labelsHtml += `<text x="${x + larguraBarra/2}" y="${altura - 10}" fill="#64748b" font-size="10" font-weight="800" text-anchor="middle">${dado.semana}</text>`;
            });

            const yMeta = altura - margemYBase - (((95 - minF) / (maxF - minF)) * alturaUtil);

            wrapper.innerHTML = `
                <svg viewBox="0 0 ${largura} ${altura}" class="w-full h-full overflow-visible">
                    <style>
                        .grupo-barra { opacity: 0; animation: fadeUpBar 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                        @keyframes fadeUpBar {
                            from { opacity: 0; transform: translateY(15px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                    </style>
                    <line x1="${margemX}" y1="${yMeta}" x2="${largura - margemX}" y2="${yMeta}" stroke="#10b981" stroke-dasharray="5 5" stroke-width="2" opacity="0.5"/>
                    <text x="${largura - margemX + 5}" y="${yMeta + 3}" fill="#10b981" font-size="9" font-weight="900">META</text>
                    ${labelsHtml}
                    ${barrasHtml}
                </svg>`;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            if (isPaused) {
                clearInterval(loopInterval); cancelAnimationFrame(animBarra);
                tRestante = tRestante - (Date.now() - tInicioSlide);
            } else {
                tInicioSlide = Date.now();
                loopInterval = setTimeout(() => mudarSlide(1), tRestante);
                atualizarBarraTempoAvançado();
            }
        }

        function atualizarBarraTempoAvançado() {
            const currentSlide = document.querySelector(".pagina-slide.active");
            if (isPaused || sorteioEmAndamento || (currentSlide && currentSlide.classList.contains('slide-tipo-sorteio'))) return;
            const barra = document.getElementById('barra-tempo');
            const decorrido = Date.now() - tInicioSlide;
            const pct = Math.min((decorrido / tRestante) * 100, 100);
            barra.style.width = (100 - pct) + "%";
            if (decorrido < tRestante) { animBarra = requestAnimationFrame(atualizarBarraTempoAvançado); }
        }

        function mudarSlide(direcao) {
            if (sorteioEmAndamento) return; 
            
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length <= 1) return;

            timersPagina.forEach(t => clearTimeout(t)); timersPagina = [];
            
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            document.getElementById("indicador-pagina").innerText = `Pág. ${indexSlide + 1} de ${slides.length}`;
            
            const currentSlide = slides[indexSlide];

            if (indexSlide === 0) { carregarDadosEmBack(); }

            if (currentSlide.classList.contains('slide-tipo-lista')) {
                const containerGrafico = currentSlide.querySelector('.box-plot-grafico');
                if (containerGrafico) { renderizarGraficoHistorico(containerGrafico.id); }

                currentSlide.querySelectorAll('.card-turma, .card-bloco-media').forEach(el => {
                    const idTarget = el.dataset.id; const valTarget = parseFloat(el.dataset.target);
                    if(idTarget && !isNaN(valTarget)) {
                        const b = document.getElementById(`barra-${idTarget}`);
                        if (b) { b.style.width = "0%"; b.style.backgroundColor = "#e11d48"; b.innerText = "0.0%"; b.style.boxShadow = "none"; }
                        setTimeout(() => animarBarraECounter(idTarget, valTarget, 5000), 150);
                    }
                });
                if (currentSlide.dataset.hasElite === "true") {
                    let tc = setTimeout(dispararConfetesEspeciais, 5200); timersPagina.push(tc);
                }
            } 
            else if (currentSlide.classList.contains('slide-tipo-disputa')) {
                const coroaManha = currentSlide.querySelector('.coroa-m'); const coroaTarde = currentSlide.querySelector('.coroa-t');
                if (coroaManha) coroaManha.style.opacity = "0"; if (coroaTarde) coroaTarde.style.opacity = "0";

                currentSlide.querySelectorAll('.card-bloco-media').forEach(el => {
                    animarBarraECounter(el.dataset.id, parseFloat(el.dataset.target), 4500);
                });
                let tCoroa = setTimeout(() => {
                    if (coroaManha && coroaManha.dataset.vencedor === "true") coroaManha.style.opacity = "1";
                    if (coroaTarde && coroaTarde.dataset.vencedor === "true") coroaTarde.style.opacity = "1";
                }, 4700);
                timersPagina.push(tCoroa);
            }
            else if (currentSlide.classList.contains('slide-tipo-desafio')) {
                currentSlide.querySelectorAll('.card-bloco-media').forEach(el => {
                    animarBarraECounter(el.dataset.id, parseFloat(el.dataset.target), 5000);
                });
            }
            else if (currentSlide.classList.contains('slide-tipo-ranking')) {
                const pod1 = currentSlide.querySelector('.pod-ouro'); const pod2 = currentSlide.querySelector('.pod-prata');
                const pod3 = currentSlide.querySelector('.pod-bronze'); const demaisClass = currentSlide.querySelector('.demais-class-box');

                if (pod1) pod1.style.animation = "none"; if (pod2) pod2.style.animation = "none";
                if (pod3) pod3.style.animation = "none"; if (demaisClass) demaisClass.style.opacity = "0";

                let r3 = setTimeout(() => {
                    if (pod3) { pod3.style.animation = "subirPodio 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards"; animarBarraECounter(pod3.dataset.id, parseFloat(pod3.dataset.target), 2000); }
                }, 1000); timersPagina.push(r3);

                let r2 = setTimeout(() => {
                    if (pod2) { pod2.style.animation = "subirPodio 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards"; animarBarraECounter(pod2.dataset.id, parseFloat(pod2.dataset.target), 2000); }
                }, 3200); timersPagina.push(r2);

                let r1 = setTimeout(() => {
                    if (pod1) { pod1.style.animation = "subirPodio 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards"; animarBarraECounter(pod1.dataset.id, parseFloat(pod1.dataset.target), 2000); }
                    if (demaisClass) {
                        demaisClass.style.transition = "opacity 0.6s ease"; demaisClass.style.opacity = "1";
                        demaisClass.querySelectorAll('.card-bloco-media').forEach(el => { animarBarraECounter(el.dataset.id, parseFloat(el.dataset.target), 2000); });
                    }
                }, 5400); timersPagina.push(r1);

                let rConf = setTimeout(dispararConfetesEspeciais, 7500); timersPagina.push(rConf);
            }
            else if (currentSlide.classList.contains('slide-tipo-top5')) {
                const linesTop5 = currentSlide.querySelectorAll('.linha-top5');
                linesTop5.forEach(l => { l.style.opacity = "0"; l.style.transform = "translateY(20px)"; });

                for (let idx = 4; idx >= 0; idx--) {
                    let delayRevelacao = (4 - idx) * 1200 + 500; 
                    let tLinha = setTimeout(() => {
                        if (linesTop5[idx]) {
                            linesTop5[idx].style.transition = "all 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
                            linesTop5[idx].style.opacity = "1"; linesTop5[idx].style.transform = "translateY(0)";
                            animarBarraECounter(linesTop5[idx].dataset.id, parseFloat(linesTop5[idx].dataset.target), 1500);
                            if(idx === 0) { setTimeout(dispararConfetesEspeciais, 1200); }
                        }
                    }, delayRevelacao);
                    timersPagina.push(tLinha);
                }
            }

            if (currentSlide.classList.contains('slide-tipo-sorteio')) { fecharModoSorteio(); return; }

            tRestante = tempoSlideMs; tInicioSlide = Date.now();
            if (!isPaused) {
                clearTimeout(loopInterval); cancelAnimationFrame(animBarra);
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempoAvançado();
            }
        }

        function forçarAberturaSorteio() {
            if (sorteioEmAndamento) return;
            clearInterval(loopInterval); cancelAnimationFrame(animBarra);
            timersPagina.forEach(t => clearTimeout(t));
            document.getElementById('barra-tempo').style.width = "0%";
            
            const slides = document.querySelectorAll(".pagina-slide");
            slides.forEach(s => s.classList.remove("active"));
            
            const slideSorteio = document.querySelector(".slide-tipo-sorteio");
            if(slideSorteio) {
                slideSorteio.classList.add("active");
                document.getElementById("indicador-pagina").innerText = `MODO SORTEIO`;
                document.getElementById("nome-sorteado-display").innerText = "???";
            }
        }

        function fecharModoSorteio() {

            if (sorteioEmAndamento) return;

            const alunosFiltrados = todosAlunos.filter(a => a.turma.toLowerCase() === turmaAlvo.toLowerCase());
            const displayNome = document.getElementById("nome-sorteado-display");
            const btn = document.getElementById("btn-trigger-sorteio");

            if (alunosFiltrados.length === 0) { displayNome.innerText = "Sem alunos na turma!"; return; }

            sorteioEmAndamento = true;
            if(btn) btn.style.display = "none"; if(btnFechar) btnFechar.style.display = "none"; seletor.disabled = true; 
            let giros = 0; let velocidade = 50; let totalGiros = 50; 

            function roletar() {
                giros++;

                const nomeCandidato = alunosFiltrados[indiceAleatorio].nome;
                displayNome.innerText = nomeCandidato; ajustarFonteNomeSorteado(nomeCandidato);
                ticarSom(600 - (giros * 5), 40);

        async function carregarDadosEmBack() {
            try {

                let novosAlunos = [];

                    const colsA = linhasAlunos[j].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                    if (colsA.length >= 2) { novosAlunos.push({ nome: colsA[0], turma: colsA[1] }); }

        async function carregarDados() {
            try {
                const res = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                if(!res.ok) throw new Error("Erro Planilha Principal");
                const txt = await res.text(); const linhas = txt.split(/\r?\n/);
                todasTurmas = [];
                
                for (let i = 1; i < linhas.length; i++) {
                    if (linhas[i].trim().length < 4) continue;
                    const cols = linhas[i].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                    if (cols.length >= 2) {
                        const nome = cols[0]; const freq = parseFloat(cols[1].replace(",", "."));
                        const turno = cols[2] ? cols[2].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        if (!isNaN(freq) && nome.length > 0) todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof });
                    }
                }

                try {
                    const resAlunos = await fetch(LINK_ALUNOS + "&cache=" + Date.now());
                    const txtAlunos = await resAlunos.text(); const linhasAlunos = txtAlunos.split(/\r?\n/);
                    todosAlunos = [];
                    for (let j = 1; j < linhasAlunos.length; j++) {
                        if (linhasAlunos[j].trim().length < 3) continue;
                        const colsA = linhasAlunos[j].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                        if (colsA.length >= 2) todosAlunos.push({ nome: colsA[0], turma: colsA[1] });
                    }
                } catch(eA) { }

                try {
                    const resHist = await fetch(LINK_HISTORICO + "&cache=" + Date.now());
                    if(!resHist.ok) throw new Error("Acesso Histórico Falhou");
                    const txtHist = await resHist.text(); 
                    if(txtHist.includes("<html")) throw new Error("HTML no Histórico");
                    
                    const linhasHist = txtHist.split(/\r?\n/);
                    historicoEscola = [];
                    for(let k = 1; k < linhasHist.length; k++) {
                        if (linhasHist[k].trim().length < 3) continue;
                        const colsH = linhasHist[k].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                        if(colsH.length >= 2) {
                            let semNome = colsH[0]; 
                            if(semNome.toLowerCase() !== "esta") { semNome = "S" + semNome; }
                            const medVal = parseFloat(colsH[1].replace(",", "."));
                            if(!isNaN(medVal)) historicoEscola.push({ semana: semNome, media: medVal });
                        }
                    }
                    if (historicoEscola.length > 10) { historicoEscola = historicoEscola.slice(-10); }
                } catch(errH) {
                    historicoEscola = []; 
                }

                if (todasTurmas.length > 0) {
                    mediaGeralEscolaGlobal = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
                    
                    if (historicoEscola.length > 0 && historicoEscola[historicoEscola.length - 1].semana.toLowerCase() === "esta") {
                        historicoEscola[historicoEscola.length - 1].media = mediaGeralEscolaGlobal;
                    }
                    atualizarTextoSemana(); gerarSlides();
                }
            } catch (err) { console.error("Falha geral:", err); }
        }

                                    <div id="card-${localId}" data-id="${localId}" data-target="${t.valor}" class="flex justify-between items-center bg-white/60 px-4 py-1 rounded-xl border border-white shadow-sm card-bloco-media">
                                        <span class="font-black text-slate-700 text-base uppercase truncate max-w-[65%] tracking-tight">${t.nome}</span>
                                        <span class="font-black text-xl text-rose-500 shrink-0 num-contador-txt">0.0%</span>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>
                </div>`;
            container.appendChild(slide);
            return localId;
        }

        function iniciarAnimacao() {
            if (loopInterval) clearTimeout(loopInterval);
            cancelAnimationFrame(animBarra);
            timersPagina.forEach(t => clearTimeout(t)); timersPagina = [];

            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            indexSlide = 0; slides[indexSlide].classList.add('active');
            document.getElementById("indicador-pagina").innerText = `Pág. 1 de ${slides.length}`;
            
            if (slides[indexSlide].classList.contains('slide-tipo-lista')) {
                const containerGrafico = slides[indexSlide].querySelector('.box-plot-grafico');
                if (containerGrafico) { renderizarGraficoHistorico(containerGrafico.id); }

                slides[indexSlide].querySelectorAll('.card-turma, .card-bloco-media').forEach(el => {
                    const idTarget = el.dataset.id; const valTarget = parseFloat(el.dataset.target);
                    if(idTarget && !isNaN(valTarget)) animarBarraECounter(idTarget, valTarget, 5000);
                });
            }

            tRestante = tempoSlideMs; tInicioSlide = Date.now();
            if (!isPaused) {
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempoAvançado();
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

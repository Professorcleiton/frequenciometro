<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        
        /* Ajuste do Fundo para não deixar espaço branco */
        body { 
            background-color: #f1f5f9; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            overflow: hidden; position: relative; 
        }
        .fundo-textura { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('LogoA.png'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover; /* Garante que cubra tudo */
            opacity: 0.05; z-index: -1; pointer-events: none; 
        }

        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card-turma { border-left-width: 16px; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        /* Podium */
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 350px; margin-top: 20px; }
        .podium-item { display: flex; flex-direction: column; align-items: center; width: 220px; border-radius: 20px 20px 0 0; padding-bottom: 20px; }
        .podium-1 { height: 100%; background: linear-gradient(to top, #ca8a04, #facc15); order: 2; }
        .podium-2 { height: 80%; background: linear-gradient(to top, #4b5563, #9ca3af); order: 1; }
        .podium-3 { height: 65%; background: linear-gradient(to top, #7c2d12, #b45309); order: 3; }

        /* Controles */
        .controles-painel { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .btn-ctrl { 
            background: rgba(15, 23, 42, 0.9); color: white; border-radius: 50%; 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 2px solid rgba(255,255,255,0.2); font-size: 1.2rem;
        }
        .btn-ctrl:hover { background: #1e3a8a; transform: scale(1.1); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col">

    <div class="fundo-textura"></div>

    <div class="controles-painel">
        <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
        <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
        <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
    </div>

    <header class="bg-white/95 px-8 py-1 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <img src="nucleo.png" alt="NRE" class="h-14 object-contain">
            <img src="LogoA.png" alt="CCM Anchieta" class="h-28 object-contain py-1">
            <div class="ml-2 text-[#1e3a8a]">
                <h1 class="text-3xl md:text-4xl font-black uppercase leading-none tracking-tighter">CCM ANCHIETA</h1>
                <p id="info-semana" class="text-slate-500 font-bold tracking-[0.1em] text-[12px] uppercase italic">Carregando Semana...</p>
            </div>
        </div>
        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-100 px-4 py-1 rounded-full mb-1">Sincronizando...</p>
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 w-full max-w-[1850px] mx-auto overflow-hidden z-10">
        </main>

    <footer class="w-full bg-[#0f172a] text-white p-2 flex justify-between items-center px-16 text-xs font-black uppercase tracking-widest shrink-0 z-10">
        <div class="flex gap-12">
            <div class="flex items-center gap-3"><span>✋</span> < 90%</div>
            <div class="flex items-center gap-3"><span>👍</span> 90-95%</div>
            <div class="flex items-center gap-3"><span>👏</span> > 95%</div>
        </div>
        <img src="criancas.png" alt="Estudantes" class="h-12 object-contain">
    </footer>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;

        // Cálculo da Semana do Ano
        function getSemanaAno() {
            const agora = new Date();
            const inicioAno = new Date(agora.getFullYear(), 0, 1);
            const dias = Math.floor((agora - inicioAno) / (24 * 60 * 60 * 1000));
            return Math.ceil((dias + inicioAno.getDay() + 1) / 7);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            if (isPaused) clearInterval(loopInterval); else iniciarAnimacao();
        }

        function mudarSlide(direcao) {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            if (!isPaused) { clearInterval(loopInterval); iniciarAnimacao(); }
        }

        async function carregarDados() {
            try {
                const response = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim().length > 3);
                todasTurmas = [];
                let somaGeralHistorica = 0; // Simulando média de todas as semanas se houver na planilha
                
                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(",");
                    if (cols.length < 3) cols = linhas[i].split(";");
                    if (cols.length >= 2) {
                        const nome = cols[0].replace(/"/g, "").trim();
                        const freq = parseFloat(cols[1].replace(",", "."));
                        const turno = cols[2]?.toLowerCase() || "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        const freqHistorica = cols[4] ? parseFloat(cols[4].replace(",", ".")) : freq; // Exemplo de coluna 5 com média total

                        if (!isNaN(freq)) {
                            todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof, historico: freqHistorica });
                        }
                    }
                }
                document.getElementById("info-semana").innerText = `SEMANA ${getSemanaAno()} • FREQUENCIÔMETRO DIGITAL`;
                gerarSlides();
            } catch (err) { console.error(err); }
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            
            const manha = todasTurmas.filter(t => t.bloco.includes("manha"));
            const tarde = todasTurmas.filter(t => t.bloco.includes("tarde"));
            
            if (manha.length > 0) montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600");
            if (tarde.length > 0) montarPaginas(tarde, "TURNO TARDE", "bg-blue-900");

            // Slide Pódio
            const top3 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 3);
            if (top3.length >= 3) {
                const pSlide = document.createElement("div");
                pSlide.className = "pagina-slide w-full h-full pt-10";
                pSlide.innerHTML = `
                    <div class="flex flex-col h-full items-center">
                        <div class="bg-yellow-500 text-blue-950 py-3 px-20 rounded-full font-black text-4xl mb-4 shadow-xl border-4 border-yellow-200 uppercase tracking-tighter">🏆 PODIUM DA SEMANA 🏆</div>
                        <div class="podium-container">
                            <div class="podium-item podium-2 shadow-2xl"><span class="text-6xl mb-2">🥈</span><p class="text-white font-black text-2xl uppercase">${top3[1].nome}</p><p class="text-white font-black text-4xl">${top3[1].valor.toFixed(1)}%</p></div>
                            <div class="podium-item podium-1 shadow-2xl scale-110"><span class="text-7xl mb-2">🥇</span><p class="text-blue-900 font-black text-3xl uppercase">${top3[0].nome}</p><p class="text-blue-900 font-black text-5xl">${top3[0].valor.toFixed(1)}%</p></div>
                            <div class="podium-item podium-3 shadow-2xl"><span class="text-6xl mb-2">🥉</span><p class="text-white font-black text-2xl uppercase">${top3[2].nome}</p><p class="text-white font-black text-4xl">${top3[2].valor.toFixed(1)}%</p></div>
                        </div>
                    </div>`;
                container.appendChild(pSlide);
            }

            // Slide de Médias Gerais
            const mediaSemana = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
            const mediaTotalAno = todasTurmas.reduce((acc, t) => acc + (t.historico || t.valor), 0) / todasTurmas.length;

            const mSlide = document.createElement("div");
            mSlide.className = "pagina-slide w-full h-full";
            mSlide.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full gap-6">
                    <div class="grid grid-cols-2 gap-8 w-full max-w-6xl">
                        <div class="bg-white/90 p-8 rounded-[2rem] shadow-xl border-b-8 border-blue-600 text-center">
                            <h3 class="text-2xl font-black text-blue-900 uppercase">Média desta Semana</h3>
                            <div class="text-9xl font-black text-blue-600 my-4">${mediaSemana.toFixed(1)}%</div>
                        </div>
                        <div class="bg-white/90 p-8 rounded-[2rem] shadow-xl border-b-8 border-emerald-600 text-center">
                            <h3 class="text-2xl font-black text-emerald-900 uppercase">Média Geral Acumulada</h3>
                            <div class="text-9xl font-black text-emerald-600 my-4">${mediaTotalAno.toFixed(1)}%</div>
                        </div>
                    </div>
                    <p class="text-2xl font-black text-blue-900 bg-white/80 px-10 py-2 rounded-full italic">"Construindo o futuro com presença!"</p>
                </div>`;
            container.appendChild(mSlide);
            iniciarAnimacao();
        }

        function montarPaginas(lista, titulo, cor) {
            const container = document.getElementById("container-slides");
            for (let i = 0; i < lista.length; i += 6) {
                const pedaço = lista.slice(i, i + 6);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full pt-4";
                slide.innerHTML = `
                    <div class="flex flex-col h-full items-center">
                        <div class="${cor} text-white py-2 px-16 rounded-full font-black text-3xl mb-8 shadow-md uppercase w-fit">${titulo}</div>
                        <div class="grid grid-cols-3 gap-6 w-full">
                            ${pedaço.map(t => {
                                const corB = t.valor >= 95 ? "#10b981" : (t.valor >= 90 ? "#f59e0b" : "#e11d48");
                                return `
                                    <div class="p-5 rounded-3xl card-turma border-l-[16px] text-left">
                                        <p class="font-black text-slate-900 text-3xl uppercase truncate mb-3">${t.nome}</p>
                                        <div class="w-full bg-slate-200 rounded-xl h-14 overflow-hidden relative shadow-inner">
                                            <div class="barra-frequencia h-full text-2xl" style="background-color: ${corB}; width: ${t.valor}%">${t.valor.toFixed(1)}%</div>
                                        </div>
                                        <p class="mt-2 text-center text-xl">${"🏆".repeat(t.trofeus)}</p>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(slide);
            }
        }

        function iniciarAnimacao() {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0 || isPaused) return;
            slides.forEach(s => s.classList.remove("active"));
            slides[indexSlide].classList.add('active');
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            loopInterval = setInterval(() => mudarSlide(1), 10000);
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

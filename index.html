<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Removida a transition CSS para o JS controlar o preenchimento e a cor milímetro por milímetro */
        .barra-frequencia { display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; width: 0%; }
        body { background-color: #f1f5f9; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .fundo-textura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('LogoA.png'); background-repeat: no-repeat; background-position: center; background-size: cover; opacity: 0.05; z-index: -1; pointer-events: none; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { border-left-width: 24px; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); min-height: 160px; transition: border-color 0.3s ease; }
        
        .card-animado { animation: itemEntrada 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .card-animado:nth-child(1) { animation-delay: 0.1s; }
        .card-animado:nth-child(2) { animation-delay: 0.2s; }
        .card-animado:nth-child(3) { animation-delay: 0.3s; }
        .card-animado:nth-child(4) { animation-delay: 0.4s; }

        @keyframes itemEntrada {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #barra-tempo { height: 4px; background: #3b82f6; width: 0%; position: absolute; top: 0; left: 0; }
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 15px; height: 200px; margin-bottom: 15px; }
        .podium-item { display: flex; flex-direction: column; align-items: center; width: 170px; border-radius: 15px 15px 0 0; padding-bottom: 10px; animation: itemEntrada 0.8s ease forwards; }
        .btn-ctrl { background: rgba(255, 255, 255, 0.15); color: white; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s; }
        .btn-ctrl:hover { background: #2563eb; transform: scale(1.1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col">

    <div class="fundo-textura"></div>

    <header class="bg-white/95 px-8 py-2 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <img src="nucleo.png" alt="NRE" class="h-14 object-contain">
            <img src="Design sem nome (1) (1).jpg" alt="CCM Anchieta" class="h-20 object-contain">
        </div>
        <div class="text-center flex-grow">
            <h1 class="text-3xl font-black text-[#1e3a8a] uppercase leading-none tracking-tighter">CCM ANCHIETA</h1>
            <p class="text-slate-500 font-bold tracking-[0.2em] text-[10px] uppercase italic block mb-1">FREQUENCIÔMETRO DIGITAL</p>
            <p id="info-semana-detalhada" class="text-blue-700 font-bold text-lg bg-blue-50 px-6 py-1 rounded-full inline-block border border-blue-100 italic">Calculando...</p>
        </div>
        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-100 px-4 py-1 rounded-full mb-1">Página --</p>
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-6 w-full max-w-[1850px] mx-auto overflow-hidden z-10 flex items-center justify-center text-center">
        <p id="status-msg" class="text-blue-900 font-bold animate-pulse text-2xl uppercase">Carregando painel...</p>
    </main>

    <div class="relative shrink-0">
        <div id="barra-tempo"></div>
        <footer class="w-full bg-[#0f172a] text-white p-3 flex justify-between items-center px-16 text-xs font-black uppercase tracking-widest z-50">
            <div class="flex gap-10 items-center text-[10px]">
                <div class="flex items-center gap-2"><span>✋</span> < 90%</div>
                <div class="flex items-center gap-2"><span>👍</span> 90-95%</div>
                <div class="flex items-center gap-2"><span>👏</span> > 95%</div>
            </div>
            <div class="flex gap-4 items-center bg-white/5 px-4 py-1 rounded-full">
                <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
                <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
                <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
            </div>
            <div class="flex items-center gap-4">
                <span class="opacity-50 text-[10px]">CCM ANCHIETA</span>
                <img src="criancas.png" alt="Estudantes" class="h-10 object-contain">
            </div>
        </footer>
    </div>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;
        let tempoSlideMs = 14000; // Aumentado para 14s para dar tempo de curtir a subida lenta
        let tInicioSlide = 0;
        let tRestante = 14000;
        let animBarra = null;

        function obterCoresPorValor(valor) {
            if (valor >= 95) return { hex: "#10b981", tailwindTxt: "text-emerald-600", tailwindBorder: "border-emerald-600" };
            if (valor >= 90) return { hex: "#f59e0b", tailwindTxt: "text-amber-500", tailwindBorder: "border-amber-500" };
            return { hex: "#e11d48", tailwindTxt: "text-rose-600", tailwindBorder: "border-rose-600" };
        }

        function atualizarTextoSemana() {
            const hoje = new Date();
            const dataReferencia = new Date(hoje.getTime() - 7 * 24 * 60 * 60 * 1000);
            const inicioAno = new Date(dataReferencia.getFullYear(), 0, 1);
            const dias = Math.floor((dataReferencia - inicioAno) / (24 * 60 * 60 * 1000));
            const numSem = Math.ceil((dias + inicioAno.getDay() + 1) / 7);
            const dSem = dataReferencia.getDay();
            const diffSeg = dataReferencia.getDate() - (dSem === 0 ? 6 : dSem - 1);
            const seg = new Date(new Date(dataReferencia).setDate(diffSeg));
            const dom = new Date(new Date(seg).setDate(seg.getDate() + 6));
            const fmt = (d) => d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            document.getElementById("info-semana-detalhada").innerText = `DADOS DA SEMANA ${numSem} • ${fmt(seg)} a ${fmt(dom)}`;
        }

        // MOTOR DE ANIMAÇÃO AVANÇADO: Controla número, barra, cor e velocidade de aproximação simulada
        function animarBarraECounter(idCard, valorFinal) {
            const cardElement = document.getElementById(`card-${idCard}`);
            const barraElement = document.getElementById(`barra-${idCard}`);
            
            let valorAtual = 0;
            let tempoTotalEstimado = 2800; // Tempo total da jornada
            let tempoInicio = null;

            function executarSubida(timestamp) {
                if (!tempoInicio) tempoInicio = timestamp;
                let tempoDecorrido = timestamp - tempoInicio;

                // Fração de tempo linear (de 0 a 1)
                let t = Math.min(tempoDecorrido / tempoTotalEstimado, 1);

                // EFEITO SUSPENSE COGNITIVO: Desacelera drasticamente perto de 90% e muito mais perto de 95%
                // Usando uma curva bezier customizada calculada via JS para gerar o "peso" da subida
                let fatorCurva = 1 - Math.pow(1 - t, 3); // Ease Out cúbico base
                
                valorAtual = fatorCurva * valorFinal;

                // Forçar desaceleração manual extra quando entra na zona crítica de mudança (perto de 90 e perto de 95)
                if (valorAtual >= 88 && valorAtual < 90) {
                    valorAtual = 88 + (fatorCurva - 0.7) * 4; // Deixa mais lento perto de 90
                } else if (valorAtual >= 93 && valorAtual < 95) {
                    // Quase parando perto dos 95%
                    let progressoLento = (tempoDecorrido - (tempoTotalEstimado * 0.6)) / (tempoTotalEstimado * 0.4);
                    progressoLento = Math.max(0, Math.min(progressoLento, 1));
                    valorAtual = 93 + (Math.sin(progressoLento * Math.PI / 2) * 2);
                }

                // Garantir o teto e o ajuste final
                if (t >= 1 || valorAtual >= valorFinal) {
                    valorAtual = valorFinal;
                }

                // Captura a cor correspondente exata ao valor dinâmico daquele milissegundo
                const coresDinamicas = obterCoresPorValor(valorAtual);

                // Aplica as atualizações estéticas sincronizadas simultaneamente
                if (barraElement) {
                    barraElement.innerText = valorAtual.toFixed(1) + "%";
                    // Limita a largura visual para a barra não quebrar o container caso passe de 100
                    barraElement.style.width = Math.min(valorAtual, 100) + "%";
                    barraElement.style.backgroundColor = coresDinamicas.hex;
                }

                if (cardElement) {
                    // Troca dinamicamente a borda esquerda do Card de acordo com o nível alcançado
                    cardElement.style.borderColor = coresDinamicas.hex;
                    
                    // Se houver um contador de texto isolado fora da barra (como nas médias) atualiza também
                    const txtContador = cardElement.querySelector('.num-contador-txt');
                    if (txtContador) {
                        txtContador.innerText = valorAtual.toFixed(1) + "%";
                        txtContador.className = `text-8xl font-black num-contador-txt ${coresDinamicas.tailwindTxt}`;
                    }
                }

                // Continua a animação enquanto não chegar ao objetivo final
                if (t < 1 && valorAtual < valorFinal) {
                    window.requestAnimationFrame(executarSubida);
                }
            }
            window.requestAnimationFrame(executarSubida);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
            if (isPaused) {
                clearInterval(loopInterval);
                cancelAnimationFrame(animBarra);
                tRestante = tRestante - (Date.now() - tInicioSlide);
            } else {
                tInicioSlide = Date.now();
                loopInterval = setTimeout(() => mudarSlide(1), tRestante);
                atualizarBarraTempoAvançado();
            }
        }

        function atualizarBarraTempoAvançado() {
            if (isPaused) return;
            const barra = document.getElementById('barra-tempo');
            const decorrido = Date.now() - tInicioSlide;
            const pct = Math.min((decorrido / tRestante) * 100, 100);
            barra.style.width = (100 - pct) + "%";
            if (decorrido < tRestante) {
                animBarra = requestAnimationFrame(atualizarBarraTempoAvançado);
            }
        }

        function mudarSlide(direcao) {
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length <= 1) return;
            
            slides[indexSlide].classList.remove("active");
            indexSlide = (indexSlide + direcao + slides.length) % slides.length;
            slides[indexSlide].classList.add("active");
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            
            // Disparar o motor de animação unificado em todos os elementos válidos da página ativa
            slides[indexSlide].querySelectorAll('.card-turma, .card-bloco-media').forEach(el => {
                const idTarget = el.dataset.id;
                const valTarget = parseFloat(el.dataset.target);
                if(idTarget && !isNaN(valTarget)) {
                    // Força reset inicial visual em vermelho e 0% antes de subir
                    const b = document.getElementById(`barra-${idTarget}`);
                    if (b) { b.style.width = "0%"; b.style.backgroundColor = "#e11d48"; b.innerText = "0.0%"; }
                    el.style.borderColor = "#e11d48";
                    
                    // Começa a escalada dramática
                    setTimeout(() => {
                        animarBarraECounter(idTarget, valTarget);
                    }, 150);
                }
            });

            if (slides[indexSlide].dataset.hasElite === "true") {
                // Dispara os confetes com um leve atraso para dar tempo de a barra subir e bater a meta na tela!
                setTimeout(dispararConfetesEspeciais, 2200);
            }

            tRestante = tempoSlideMs;
            tInicioSlide = Date.now();
            
            if (!isPaused) {
                clearTimeout(loopInterval);
                cancelAnimationFrame(animBarra);
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempoAvançado();
            }
        }

        function dispararConfetesEspeciais() {
            var duracao = 2.5 * 1000;
            var fim = Date.now() + duracao;
            (function moldura() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0, y: 0.75 } });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1, y: 0.75 } });
                if (Date.now() < fim) { requestAnimationFrame(moldura); }
            }());
        }

        async function carregarDados() {
            try {
                const res = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const txt = await res.text();
                const linhas = txt.split(/\r?\n/);
                todasTurmas = [];
                
                for (let i = 1; i < linhas.length; i++) {
                    if (linhas[i].trim().length < 4) continue;
                    const cols = linhas[i].split(/[,;]/).map(c => c.replace(/^"|"$/g, '').trim());
                    if (cols.length >= 2) {
                        const nome = cols[0];
                        const freq = parseFloat(cols[1].replace(",", "."));
                        const turno = cols[2] ? cols[2].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "tarde";
                        const trof = parseInt(cols[3]) || 0;
                        if (!isNaN(freq) && nome.length > 0) {
                            todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof });
                        }
                    }
                }
                if (todasTurmas.length > 0) {
                    atualizarTextoSemana();
                    gerarSlides();
                }
            } catch (err) { console.error(err); }
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            
            const manha = todasTurmas.filter(t => t.bloco.includes("man"));
            const tarde = todasTurmas.filter(t => t.bloco.includes("tard"));
            
            let idGlobal = 0;

            if (manha.length > 0) {
                idGlobal = montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600", idGlobal);
                idGlobal = montarSlideRankingTurno(manha, "RANKING SEMANAL - MANHÃ", "bg-blue-600", idGlobal);
            }
            if (tarde.length > 0) {
                idGlobal = montarPaginas(tarde, "TURNO TARDE", "bg-blue-900", idGlobal);
                idGlobal = montarSlideRankingTurno(tarde, "RANKING SEMANAL - TARDE", "bg-blue-900", idGlobal);
            }

            // DISPUTA INTERTURNOS
            if (manha.length > 0 && tarde.length > 0) {
                const medManha = manha.reduce((acc, t) => acc + t.valor, 0) / manha.length;
                const medTarde = tarde.reduce((acc, t) => acc + t.valor, 0) / tarde.length;
                const vM = medManha > medTarde ? "👑" : "";
                const vT = medTarde > medManha ? "👑" : "";
                
                idGlobal++;
                let idM = idGlobal;
                idGlobal++;
                let idT = idGlobal;

                const tSlide = document.createElement("div");
                tSlide.className = "pagina-slide w-full h-full";
                tSlide.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full gap-8">
                        <div class="bg-slate-800 text-white py-3 px-16 rounded-full font-black text-3xl mb-4 uppercase shadow-md">⚔️ DISPUTA ENTRE TURNOS ⚔️</div>
                        <div class="grid grid-cols-2 gap-12 w-full max-w-5xl">
                            <div id="card-${idM}" data-id="${idM}" data-target="${medManha}" class="bg-white/90 p-8 rounded-[2.5rem] shadow-2xl border-b-[15px] card-bloco-media border-rose-600 text-center relative">
                                <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-4xl">${vM}</span>
                                <h3 class="text-3xl font-black text-blue-600 uppercase mb-2">Média Manhã</h3>
                                <div class="text-8xl font-black text-rose-600 num-contador-txt">0.0%</div>
                            </div>
                            <div id="card-${idT}" data-id="${idT}" data-target="${medTarde}" class="bg-white/90 p-8 rounded-[2.5rem] shadow-2xl border-b-[15px] card-bloco-media border-rose-600 text-center relative">
                                <span class="absolute -top-6 left-1/2 -translate-x-1/2 text-4xl">${vT}</span>
                                <h3 class="text-3xl font-black text-blue-900 uppercase mb-2">Média Tarde</h3>
                                <div class="text-8xl font-black text-rose-600 num-contador-txt">0.0%</div>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(tSlide);
            }

            // DESAFIO COLETIVO (META OURO)
            const mediaGeralEscola = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
            const metaOuro = 95.0;
            const faltaParaMeta = Math.max(metaOuro - mediaGeralEscola, 0);
            
            const msgMissao = faltaParaMeta > 0 
                ? `Faltam apenas <span class="text-blue-600 font-black">${faltaParaMeta.toFixed(1)}%</span> para o Anchieta atingir a Meta!`
                : `Parabéns Anchieta! Superamos a Meta de Elite Nacional! 🎉`;

            idGlobal++;
            let idEscola = idGlobal;

            const mSlide = document.createElement("div");
            mSlide.className = "pagina-slide w-full h-full";
            mSlide.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full gap-8">
                    <div class="bg-slate-800 text-white py-3 px-20 rounded-full font-black text-3xl mb-2 uppercase shadow-md">🎯 DESAFIO COLETIVO ANCHIETA 🎯</div>
                    <div class="grid grid-cols-2 gap-12 w-full max-w-6xl">
                        <div id="card-${idEscola}" data-id="${idEscola}" data-target="${mediaGeralEscola}" class="bg-white/90 p-10 rounded-[3rem] shadow-2xl border-b-[15px] card-bloco-media border-rose-600 text-center">
                            <h3 class="text-3xl font-black text-slate-700 uppercase mb-4">Frequência da Escola</h3>
                            <div class="text-[9rem] leading-none font-black text-rose-600 num-contador-txt">0.0%</div>
                        </div>
                        <div class="bg-white/90 p-10 rounded-[3rem] shadow-2xl border-b-[15px] border-yellow-500 text-center card-animado flex flex-col justify-center">
                            <h3 class="text-4xl font-black text-yellow-600 uppercase mb-4">🏆 META OURO</h3>
                            <div class="text-3xl text-slate-600 font-bold uppercase leading-snug px-4">${msgMissao}</div>
                        </div>
                    </div>
                </div>`;
            container.appendChild(mSlide);

            // TOP 5 GERAL
            const top5Geral = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 5);
            if (top5Geral.length > 0) {
                const gSlide = document.createElement("div");
                gSlide.className = "pagina-slide w-full h-full pt-4";
                gSlide.innerHTML = `
                    <div class="flex flex-col h-full items-center justify-center max-w-4xl mx-auto">
                        <div class="bg-gradient-to-r from-amber-500 to-yellow-500 text-blue-950 py-3 px-20 rounded-full font-black text-3xl mb-6 shadow-xl border-4 border-yellow-200 uppercase tracking-wide">🏆 TOP 5 GERAL DA ESCOLA 🏆</div>
                        <div class="w-full flex flex-col gap-3">
                            ${top5Geral.map((t) => {
                                const medalhas = ['🥇', '🥈', '🥉', '✨', '✨'];
                                const idx = top5Geral.indexOf(t);
                                idGlobal++;
                                return `
                                    <div id="card-${idGlobal}" data-id="${idGlobal}" data-target="${t.valor}" class="flex justify-between items-center bg-white/90 border-l-[16px] border-rose-600 px-8 py-3 rounded-2xl shadow-md card-bloco-media">
                                        <div class="flex items-center gap-6">
                                            <span class="text-4xl">${medalhas[idx]}</span>
                                            <span class="text-2xl font-black text-slate-400 w-10">${idx+1}º</span>
                                            <span class="font-black text-3xl text-slate-800 uppercase">${t.nome}</span>
                                            <span class="text-xs font-bold px-3 py-1 bg-slate-100 text-slate-500 rounded-full uppercase">${t.bloco.includes('man') ? 'Manhã' : 'Tarde'}</span>
                                        </div>
                                        <span class="font-black text-4xl text-rose-600 num-contador-txt">0.0%</span>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(gSlide);
            }
            iniciarAnimacao();
        }

        function montarPaginas(lista, titulo, col, idStart) {
            const container = document.getElementById("container-slides");
            let localId = idStart;
            for (let i = 0; i < lista.length; i += 4) {
                const pedaço = lista.slice(i, i + 4);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full pt-4";
                
                const temElite = pedaço.some(t => t.valor >= 95);
                if(temElite) slide.dataset.hasElite = "true";

                slide.innerHTML = `
                    <div class="flex flex-col h-full items-center">
                        <div class="${col} text-white py-3 px-20 rounded-full font-black text-3xl mb-8 shadow-md uppercase w-fit tracking-widest">${titulo}</div>
                        <div class="grid grid-cols-2 gap-10 w-full max-w-6xl mx-auto">
                            ${pedaço.map(t => { 
                                localId++;
                                return `
                                    <div id="card-${localId}" data-id="${localId}" data-target="${t.valor}" class="p-8 rounded-[2.5rem] card-turma card-animado text-left flex flex-col justify-between border-rose-600">
                                        <div class="flex justify-between items-center mb-4">
                                            <p class="font-black text-slate-950 text-5xl uppercase truncate max-w-[70%]">${t.nome}</p>
                                            <p class="text-3xl">${"🏆".repeat(t.trofeus)}</p>
                                        </div>
                                        <div class="w-full bg-slate-200 rounded-2xl h-20 overflow-hidden relative shadow-inner flex items-center">
                                            <div id="barra-${localId}" class="barra-frequencia h-full text-4xl bg-rose-600" style="width: 0%">
                                                0.0%
                                            </div>
                                        </div>
                                    </div>`; 
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(slide);
            }
            return localId;
        }

        function montarSlideRankingTurno(listaTurno, titulo, col, idStart) {
            const container = document.getElementById("container-slides");
            const ordenadas = [...listaTurno].sort((a, b) => b.valor - a.valor);
            const top3 = ordenadas.slice(0, 3);
            const restante = ordenadas.slice(3);
            if (top3.length < 1) return idStart;

            let localId = idStart;
            const slide = document.createElement("div");
            slide.className = "pagina-slide w-full h-full pt-2";
            
            const nome1 = top3[0] ? top3[0].nome : "-";
            const val1 = top3[0] ? top3[0].valor : 0;
            const nome2 = top3[1] ? top3[1].nome : "-";
            const val2 = top3[1] ? top3[1].valor : 0;
            const nome3 = top3[2] ? top3[2].nome : "-";
            const val3 = top3[2] ? top3[2].valor : 0;

            localId++; let idPod1 = localId;
            localId++; let idPod2 = localId;
            localId++; let idPod3 = localId;

            slide.innerHTML = `
                <div class="flex flex-col h-full items-center justify-start max-w-5xl mx-auto">
                    <div class="${col} text-white py-2 px-14 rounded-full font-black text-2xl mb-4 shadow-md uppercase w-fit tracking-wide">${titulo}</div>
                    <div class="podium-container shrink-0">
                        ${top3[1] ? `<div id="card-${idPod2}" data-id="${idPod2}" data-target="${val2}" class="podium-item bg-slate-300 border-b-4 border-slate-400 shadow-lg order-1 h-[80%] justify-end card-bloco-media"><span class="text-4xl mb-1">🥈</span><p class="text-slate-800 font-black text-xl uppercase leading-none">${nome2}</p><p class="text-slate-900 font-black text-2xl mt-1 num-contador-txt">0.0%</p></div>` : ''}
                        ${top3[0] ? `<div id="card-${idPod1}" data-id="${idPod1}" data-target="${val1}" class="podium-item bg-yellow-400 border-b-4 border-yellow-500 shadow-xl order-2 h-[100%] scale-105 justify-end card-bloco-media"><span class="text-5xl mb-1">🥇</span><p class="text-blue-950 font-black text-2xl uppercase leading-none">${nome1}</p><p class="text-blue-900 font-black text-3xl mt-1 num-contador-txt">0.0%</p></div>` : ''}
                        ${top3[2] ? `<div id="card-${idPod3}" data-id="${idPod3}" data-target="${val3}" class="podium-item bg-amber-600 border-b-4 border-amber-700 shadow-lg order-3 h-[65%] justify-end card-bloco-media"><span class="text-4xl mb-1">🥉</span><p class="text-amber-50 font-black text-xl uppercase leading-none">${nome3}</p><p class="text-amber-950 font-black text-2xl mt-1 num-contador-txt">0.0%</p></div>` : ''}
                    </div>
                    <div class="w-full bg-white/90 rounded-2xl p-4 shadow-xl overflow-hidden flex-grow max-h-[240px] overflow-y-auto mb-2 card-animado">
                        <h4 class="text-slate-500 font-black text-[11px] uppercase tracking-widest text-left mb-2 border-b pb-1">Demais Classificações:</h4>
                        <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-left">
                            ${restante.map((t) => {
                                localId++;
                                return `
                                    <div id="card-${localId}" data-id="${localId}" data-target="${t.valor}" class="flex justify-between items-center bg-slate-50/50 px-4 py-1.5 rounded-lg border border-slate-100 card-bloco-media">
                                        <span class="font-bold text-slate-700 text-lg uppercase"><span class="text-slate-400 mr-2 font-black">º</span> ${t.nome}</span>
                                        <span class="font-black text-xl text-rose-600 num-contador-txt">0.0%</span>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>
                </div>`;
            container.appendChild(slide);
            return localId;
        }

        function iniciarAnimacao() {
            if (loopInterval) clearTimeout(loopInterval);
            cancelAnimationFrame(animBarra);
            
            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            indexSlide = 0;
            
            slides.forEach(s => s.classList.remove("active"));
            slides[indexSlide].classList.add('active');
            document.getElementById("indicador-pagina").innerText = `Página ${indexSlide + 1} de ${slides.length}`;
            
            // Ativa os primeiros contadores da primeira página
            slides[indexSlide].querySelectorAll('.card-turma, .card-bloco-media').forEach(el => {
                const idTarget = el.dataset.id;
                const valTarget = parseFloat(el.dataset.target);
                if(idTarget && !isNaN(valTarget)) {
                    animarBarraECounter(idTarget, valTarget);
                }
            });
            if (slides[indexSlide].dataset.hasElite === "true") {
                setTimeout(dispararConfetesEspeciais, 2200);
            }

            tRestante = tempoSlideMs;
            tInicioSlide = Date.now();
            
            if (!isPaused) {
                loopInterval = setTimeout(() => mudarSlide(1), tempoSlideMs);
                atualizarBarraTempoAvançado();
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

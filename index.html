<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        body { background-color: #f1f5f9; overflow: hidden; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { min-height: 130px; border-left-width: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans h-screen flex flex-col">

    <header class="bg-white px-6 py-2 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <img src="nucleo.jpg" alt="NRE" class="h-10 md:h-12 object-contain opacity-80">
            <img src="logoA.jpg" alt="Brasão" class="h-16 md:h-24 object-contain rounded-full shadow-lg border-2 border-[#1e3a8a] bg-white p-0.5">
            <div class="ml-2 text-[#1e3a8a]">
                <h1 class="text-xl md:text-3xl font-black uppercase leading-none tracking-tighter">CCM Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-widest text-[10px] md:text-[12px] uppercase italic mt-1 leading-tighter">Frequenciômetro Digital</p>
            </div>
        </div>
        <div class="text-right flex items-center gap-4">
            <div>
                <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-50 px-4 py-1 rounded-full mb-1">Sincronizando...</p>
                <p class="text-[#1e3a8a] font-bold text-[9px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.jpg" alt="Mascotes" class="h-16 md:h-24 object-contain">
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-6 w-full max-w-[1600px] mx-auto overflow-hidden flex flex-col justify-center text-center"></main>

    <footer class="w-full bg-[#0f172a] text-white p-3 flex justify-center gap-8 text-sm font-bold uppercase tracking-wider shrink-0">
        <div class="flex items-center gap-2"><span>✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span>👍</span> 90,00 - 94,99%</div>
        <div class="flex items-center gap-2"><span>👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        const ITENS_POR_SLIDE = 6; 

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + new Date().getTime());
                const csvStr = await response.text();
                todasTurmas = [];
                const linhas = csvStr.split(/\r?\n/).filter(l => l.trim().length > 5);
                
                for (let i = 1; i < linhas.length; i++) {
                    const colunas = linhas[i].split(';');
                    const cols = colunas.length < 2 ? linhas[i].split(',') : colunas;
                    if (cols.length >= 2) {
                        const freq = cols[1].replace(/[^\d,.]/g, '').replace(',', '.');
                        todasTurmas.push({
                            nome: cols[0].replace(/"/g, '').trim(),
                            valor: parseFloat(freq),
                            bloco: cols[2] ? cols[2].toLowerCase().trim() : 'tarde',
                            trofeus: cols[3] ? parseInt(cols[3]) || 0 : 0
                        });
                    }
                }
                montarSlides();
            } catch (err) { console.error(err); }
        }

        function montarSlides() {
            const container = document.getElementById('container-slides');
            container.innerHTML = '';
            
            const series = ["6", "7", "8", "9", "1", "2", "3"];
            const nomesSéries = ["6º ANOS", "7º ANOS", "8º ANOS", "9º ANOS", "1º ANOS", "2º ANOS", "3º ANOS"];

            series.forEach((ano, i) => {
                const turmasDoAno = todasTurmas.filter(t => t.nome.includes(ano));
                if (turmasDoAno.length > 0) {
                    const tManha = turmasDoAno.filter(t => t.bloco.includes('manha'));
                    const tTarde = turmasDoAno.filter(t => t.bloco.includes('tarde'));
                    const maxPaginas = Math.ceil(Math.max(tManha.length, tTarde.length) / ITENS_POR_SLIDE);

                    for (let p = 0; p < maxPaginas; p++) {
                        const slide = document.createElement('div');
                        slide.className = "pagina-slide w-full h-full";
                        slide.innerHTML = `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 h-full">
                                <section>
                                    <div class="bg-blue-600 text-white text-center py-3 rounded-full font-black text-2xl mb-6 shadow-md uppercase tracking-widest">${nomesSéries[i]} - MANHÃ</div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        ${tManha.slice(p * ITENS_POR_SLIDE, (p + 1) * ITENS_POR_SLIDE).map(t => criarCard(t)).join('')}
                                    </div>
                                </section>
                                <section>
                                    <div class="bg-blue-900 text-white text-center py-3 rounded-full font-black text-2xl mb-6 shadow-md uppercase tracking-widest">${nomesSéries[i]} - TARDE</div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        ${tTarde.slice(p * ITENS_POR_SLIDE, (p + 1) * ITENS_POR_SLIDE).map(t => criarCard(t)).join('')}
                                    </div>
                                </section>
                            </div>`;
                        container.appendChild(slide);
                    }
                }
            });

            // SLIDE DE MÉDIAS GERAIS (Novo!)
            const turmasM = todasTurmas.filter(t => t.bloco.includes('manha'));
            const turmasT = todasTurmas.filter(t => t.bloco.includes('tarde'));
            const mediaManha = turmasM.reduce((acc, t) => acc + t.valor, 0) / (turmasM.length || 1);
            const mediaTarde = turmasT.reduce((acc, t) => acc + t.valor, 0) / (turmasT.length || 1);

            const mediaSlide = document.createElement('div');
            mediaSlide.className = "pagina-slide w-full h-full";
            mediaSlide.innerHTML = `
                <div class="flex flex-col h-full justify-center">
                    <div class="bg-blue-900 text-white text-center py-4 rounded-full font-black text-3xl mb-12 shadow-xl uppercase border-b-8 border-blue-950">
                        📊 MÉDIA GERAL DO COLÉGIO 📊
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        ${criarCardMediaGeral("TURNO MANHÃ", mediaManha)}
                        ${criarCardMediaGeral("TURNO TARDE", mediaTarde)}
                    </div>
                </div>`;
            container.appendChild(mediaSlide);

            // SLIDE DE RANKING FINAL
            const rankingSlide = document.createElement('div');
            rankingSlide.className = "pagina-slide w-full h-full";
            const top10 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 10);
            rankingSlide.innerHTML = `
                <div class="flex flex-col h-full items-center">
                    <div class="bg-yellow-500 text-blue-900 w-full text-center py-4 rounded-full font-black text-3xl mb-8 shadow-xl uppercase border-4 border-yellow-300">
                        🏆 TOP 10 FREQUÊNCIA - ANCHIETA 🏆
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                        ${top10.map((t, index) => criandoCardRanking(t, index + 1)).join('')}
                    </div>
                </div>`;
            container.appendChild(rankingSlide);

            iniciarLoop();
        }

        function criarCard(t) {
            const { corBarra, borda, corTexto, emoji, bg } = getStatusInfo(t.valor);
            return `
                <div class="p-4 rounded-xl card-turma shadow-lg flex flex-col justify-between ${bg} ${borda} transition-all">
                    <div class="flex justify-between items-start leading-none text-left">
                        <div class="flex flex-col">
                            <span class="font-black text-slate-800 text-lg md:text-xl uppercase truncate w-40 md:w-56 leading-none">${t.nome}</span>
                            <span class="text-xs mt-2">${'🏆'.repeat(t.trofeus)}</span>
                        </div>
                        <span class="text-3xl">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-4xl md:text-5xl my-2 text-left">${t.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%</div>
                    <div class="w-full bg-slate-200 rounded-full h-3 overflow-hidden border border-slate-100">
                        <div class="barra-frequencia h-full" style="background-color: ${corBarra}; width: ${t.valor > 100 ? 100 : t.valor}% !important;"></div>
                    </div>
                </div>`;
        }

        function criarCardMediaGeral(titulo, valor) {
            const { corBarra, corTexto, emoji, bg } = getStatusInfo(valor);
            return `
                <div class="p-10 rounded-3xl shadow-2xl flex flex-col justify-between ${bg} border-l-[20px] border-[rgba(0,0,0,0.05)]" style="border-left-color: ${corBarra}">
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-black text-slate-700 text-3xl uppercase tracking-tighter">${titulo}</span>
                        <span class="text-6xl">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-[120px] leading-none mb-6">
                        ${valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-8 overflow-hidden shadow-inner">
                        <div class="barra-frequencia h-full" style="background-color: ${corBarra}; width: ${valor > 100 ? 100 : valor}% !important;"></div>
                    </div>
                </div>`;
        }

        function criandoCardRanking(t, posicao) {
            return `
                <div class="p-5 rounded-2xl shadow-xl flex items-center justify-between bg-blue-900 border-l-8 border-yellow-400 text-white">
                    <div class="flex items-center gap-6 text-left">
                        <span class="text-4xl font-black text-yellow-400 leading-none">${posicao}º</span>
                        <div class="flex flex-col">
                            <span class="font-black text-2xl md:text-3xl uppercase leading-tight">${t.nome}</span>
                            <span class="text-sm text-blue-200 uppercase mt-1 tracking-widest">${t.bloco}</span>
                        </div>
                    </div>
                    <div class="text-4xl font-black text-yellow-400 whitespace-nowrap">${t.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%</div>
                </div>`;
        }

        function getStatusInfo(valor) {
            if (valor >= 95) return { corBarra: '#10b981', borda: 'border-emerald-500', corTexto: 'text-emerald-700', emoji: '👏', bg: 'bg-emerald-50' };
            if (valor >= 90) return { corBarra: '#f59e0b', borda: 'border

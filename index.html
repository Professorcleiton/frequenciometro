<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        .fundo-quadriculado {
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans min-h-screen fundo-quadriculado">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl border-4 border-blue-900 overflow-hidden">
        
        <header class="p-6 border-b-2 border-gray-100 flex flex-col items-center bg-white relative">
            
            <img src="logo.png" alt="Brasão CCM Anchieta" class="w-24 h-24 mb-4 rounded-full shadow-lg border-2 border-blue-900">
            
            <div class="text-center w-full">
                <h1 class="text-2xl md:text-3xl font-black text-gray-800 uppercase leading-tight">Colégio Estadual <br>Cívico Militar Anchieta</h1>
                <p class="text-blue-700 font-bold tracking-widest mt-1 italic uppercase">Painel de Frequência</p>
            </div>

            <div class="flex flex-col items-center md:items-end mt-4 md:absolute md:top-6 md:right-6 gap-2">
                <button onclick="carregarDados()" class="bg-blue-900 hover:bg-blue-800 text-white text-xs font-bold py-2 px-6 rounded-full shadow-lg active:scale-95 transition-all">
                    🔄 ATUALIZAR AGORA
                </button>
                <p id="data-exibicao" class="text-blue-900 font-bold text-sm uppercase"></p>
                <p class="text-gray-400 font-bold text-[10px] uppercase">Cruzeiro do Oeste - PR</p>
            </div>
        </header>

        <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="flex flex-col gap-4">
                <h3 class="bg-orange-500 text-white text-center font-black py-3 rounded-xl shadow-md uppercase">Manhã 1</h3>
                <div id="box-manha1" class="space-y-3 min-h-[100px]"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h3 class="bg-cyan-500 text-white text-center font-black py-3 rounded-xl shadow-lg uppercase">Manhã 2</h3>
                <div id="box-manha2" class="space-y-3 min-h-[100px]"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h3 class="bg-green-600 text-white text-center font-black py-3 rounded-xl shadow-lg uppercase">Tarde</h3>
                <div id="box-tarde" class="space-y-3 min-h-[100px]"></div>
            </div>
        </main>

        <footer class="bg-gray-50 p-6 border-t flex flex-wrap justify-around gap-4 text-xs font-bold uppercase tracking-tighter">
            <div class="flex items-center gap-2 text-red-600"><span>😡</span> ABAIXO DE 89,9%</div>
            <div class="flex items-center gap-2 text-yellow-600"><span>😐</span> 90% A 94,9%</div>
            <div class="flex items-center gap-2 text-green-700"><span>😊</span> ACIMA DE 95%</div>
        </footer>
    </div>

    <script>
        // SEU LINK DA PLANILHA (MANTIDO)
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        // ... O restante do JavaScript permanece exatamente o mesmo ...
        // (Copie as funções carregarDados e renderizarTurma do seu código anterior)

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                ['manha1', 'manha2', 'tarde'].forEach(id => {
                    document.getElementById('box-' + id).innerHTML = '';
                });

                const linhas = csvStr.split(/\r?\n/);

                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoDestino = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino);
                        }
                    }
                }

                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 500);

            } catch (err) { console.error("Erro:", err); }
        }

        function renderizarTurma(nome, valor, bloco) {
            const box = document.getElementById('box-' + bloco) || document.getElementById('box-tarde');
            let cor = valor >= 95 ? 'bg-green-500' : (valor >= 90 ? 'bg-yellow-500' : 'bg-red-500');
            let txt = valor >= 95 ? 'text-green-700' : (valor >= 90 ? 'text-yellow-600' : 'text-red-700');
            let emoji = valor >= 95 ? '😊' : (valor >= 90 ? '😐' : '😡');

            box.innerHTML += `
                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm transition-transform hover:scale-105">
                    <div class="flex justify-between items-center mb-1 font-black text-gray-700 text-[11px] uppercase tracking-tight">
                        <span>${nome}</span>
                        <span class="${txt}">${valor.toFixed(1).replace('.', ',')}% ${emoji}</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden border border-gray-100 shadow-inner">
                        <div class="barra-frequencia ${cor} h-full rounded-full" data-width="${valor}"></div>
                    </div>
                </div>`;
        }

        document.getElementById('data-exibicao').innerText = new Date().toLocaleDateString('pt-BR', {month: 'long', year: 'numeric'}).toUpperCase();
        window.onload = carregarDados;
    </script>
</body>
</html>

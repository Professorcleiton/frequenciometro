<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        body { background-color: #f1f5f9; }
        /* Garante que o projetor não corte as turmas */
        .card-turma { min-height: 140px; display: flex; flex-direction: column; justify-content: space-between; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-white px-6 py-4 shadow-md border-b-4 border-[#1e3a8a] flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <img src="nucleo.png" alt="NRE" class="h-10 md:h-14 object-contain opacity-80">
            <img src="logoA.png" alt="Brasão" class="h-20 md:h-28 object-contain rounded-full shadow-lg border-2 border-[#1e3a8a] bg-white p-0.5">
            <div class="hidden lg:block ml-2 text-[#1e3a8a]">
                <h1 class="text-2xl font-black uppercase leading-none">Colégio Estadual</h1>
                <h1 class="text-2xl font-black uppercase leading-none">Cívico Militar Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-[0.2em] mt-1 text-sm uppercase italic">Frequenciômetro</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-center md:text-right">
                <button onclick="carregarDados()" class="bg-[#1e3a8a] hover:bg-blue-800 text-white text-xs font-bold py-2 px-6 rounded shadow-lg transition-all mb-1">
                    🔄 ATUALIZAR DADOS
                </button>
                <p class="text-[#1e3a8a] font-black text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.png" alt="Mascotes" class="h-16 md:h-24 object-contain hidden sm:block drop-shadow-md">
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 w-full max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-10">
            
            <section>
                <div style="background-color: #2563eb;" class="text-white text-center py-3 rounded-full font-black text-xl shadow-lg mb-6 uppercase tracking-widest border-b-4 border-blue-800">
                    Turno Manhã
                </div>
                <div id="box-manha" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>

            <section>
                <div style="background-color: #1e3a8a;" class="text-white text-center py-3 rounded-full font-black text-xl shadow-lg mb-6 uppercase tracking-widest border-b-4 border-slate-900">
                    Turno Tarde
                </div>
                <div id="box-tarde" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>
        </div>
    </main>

    <footer class="w-full bg-[#0f172a] text-white p-3 flex flex-wrap justify-center gap-8 text-xs md:text-sm font-bold uppercase tracking-wider">
        <div class="flex items-center gap-2"><span>✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span>👍</span> 90,00 - 94,99%</div>
        <div class="flex items-center gap-2"><span>👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                document.getElementById('box-manha').innerHTML = '';
                document.getElementById('box-tarde').innerHTML = '';

                const linhas = csvStr.split(/\r?\n/);

                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    let colunas = linha.split(';');
                    if (colunas.length < 2) colunas = linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoPlano = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        let qtdTrofeus = 0;
                        if (colunas[3]) {
                            let t = parseInt(colunas[3].replace(/"/g, '').trim());
                            if (!isNaN(t)) qtdTrofeus = t;
                        }

                        let blocoDestino = blocoPlano.includes('manha') ? 'manha' : 'tarde';
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino, qtdTrofeus);
                        }
                    }
                }

                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', (b.dataset.width > 100 ? 100 : b.dataset.width) + '%', 'important');
                    });
                }, 300);

            } catch (err) { console.error("Erro:", err); }
        }

        function renderizarTurma(nome, valor, bloco, trofeus) {
            const box = document.getElementById('box-' + bloco);
            if (!box) return;
            
            let corBarra = valor >= 95 ? '#10b981' : (valor >= 90 ? '#f59e0b' : '#e11d48');
            let corTexto = valor >= 95 ? 'text-emerald-700' : (valor >= 90 ? 'text-amber-600' : 'text-rose-700');
            let emoji = valor >= 95 ? '👏' : (valor >= 90 ? '👍' : '✋');
            
            let valorFormatado = Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            let stringTrofeus = trofeus > 0 ? '🏆'.repeat(trofeus) : '';

            // Estilo do Card otimizado para projetor
            let estiloCard = valor >= 95 
                ? 'border-4 border-yellow-400 bg-amber-50' 
                : 'border border-slate-200 bg-white shadow-md';

            box.innerHTML += `
                <div class="p-4 rounded-xl card-turma transition-all ${estiloCard}">
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col">
                            <span class="font-black text-slate-800 text-xs md:text-sm uppercase tracking-tighter truncate">${nome}</span>
                            <span class="text-[10px] mt-1">${stringTrofeus}</span>
                        </div>
                        <span class="text-lg">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-3xl md:text-4xl my-2">
                        ${valorFormatado}%
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 border border-slate-200">
                        <div class="barra-frequencia h-full rounded-full" style="background-color: ${corBarra};" data-width="${valor}"></div>
                    </div>
                </div>`;
        }

        window.onload = carregarDados;
        setInterval(carregarDados, 900000);
    </script>
</body>
</html>

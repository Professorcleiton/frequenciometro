<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        body { background-color: #f1f5f9; overflow: hidden; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { min-height: 110px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans h-screen flex flex-col">

    <header class="bg-white px-6 py-2 shadow-md border-b-4 border-[#1e3a8a] flex flex-col md:flex-row justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <img src="nucleo.png" alt="NRE" class="h-8 md:h-10 object-contain opacity-80">
            <img src="logoA.png" alt="Brasão" class="h-16 md:h-20 object-contain rounded-full shadow-lg border-2 border-[#1e3a8a] bg-white p-0.5">
            <div class="hidden lg:block ml-2 text-[#1e3a8a]">
                <h1 class="text-xl font-black uppercase leading-none">CCM Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-[0.2em] text-[10px] uppercase italic">Frequenciômetro Digital</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-50 px-3 py-1 rounded-full mb-1">Carregando...</p>
                <p class="text-[#1e3a8a] font-bold text-[9px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.png" alt="Mascotes" class="h-12 md:h-16 object-contain hidden sm:block drop-shadow-md">
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 md:p-6 w-full max-w-[1600px] mx-auto overflow-hidden">
        </main>

    <footer class="w-full bg-[#0f172a] text-white p-2 flex justify-center gap-8 text-[10px] md:text-xs font-bold uppercase tracking-wider shrink-0">
        <div class="flex items-center gap-2"><span>✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span>👍</span> 90,00 - 94,99%</div>
        <div class="flex items-center gap-2"><span>👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';
        let turmasManha = [];
        let turmasTarde = [];
        let indexSlide = 0;
        const ITENS_POR_SLIDE = 6; // Mostra 6 da manhã e 6 da tarde por vez (Total 12)

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                turmasManha = [];
                turmasTarde = [];

                const linhas = csvStr.split(/\r?\n/);
                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;
                    let colunas = linha.split(';');
                    if (colunas.length < 2) colunas = linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const t = {
                            nome: colunas[0].replace(/"/g, '').trim(),
                            valor: parseFloat(colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim()),
                            bloco: colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde',
                            trofeus: colunas[3] ? parseInt(colunas[3].replace(/"/g, '').trim()) || 0 : 0
                        };
                        if (!isNaN(t.valor)) {
                            if (t.bloco.includes('manha')) turmasManha.push(t);
                            else turmasTarde.push(t);
                        }
                    }
                }
                montarSlides();
            } catch (err) { console.error("Erro:", err); }
        }

        function montarSlides() {
            const container = document.getElementById('container-slides');
            container.innerHTML = '';
            
            const totalPaginas = Math.ceil(Math.max(turmasManha.length, turmasTarde.length) / ITENS_POR_SLIDE);

            for (let p = 0; p < totalPaginas; p++) {
                const divSlide = document.createElement('div');
                divSlide.className = pagina-slide h-full ${p === 0 ? 'active' : ''};
                
                divSlide.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-full">
                        <section>
                            <div class="bg-blue-600 text-white text-center py-2 rounded-full font-black text-lg shadow-md mb-4 uppercase">Turno Manhã</div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                ${turmasManha.slice(p * ITENS_POR_SLIDE, (p + 1) * ITENS_POR_SLIDE).map(t => criarCard(t)).join('')}
                            </div>
                        </section>
                        <section>
                            <div class="bg-blue-900 text-white text-center py-2 rounded-full font-black text-lg shadow-md mb-4 uppercase">Turno Tarde</div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                ${turmasTarde.slice(p * ITENS_POR_SLIDE, (p + 1) * ITENS_POR_SLIDE).map(t => criarCard(t)).join('')}
                            </div>
                        </section>
                    </div>
                `;
                container.appendChild(divSlide);
            }
            
            iniciarLoop(totalPaginas);
        }

        function criarCard(t) {
            let corBarra = t.valor >= 95 ? '#10b981' : (t.valor >= 90 ? '#f59e0b' : '#e11d48');
            let corTexto = t.valor >= 95 ? 'text-emerald-700' : (t.valor >= 90 ? 'text-amber-600' : 'text-rose-700');
            let emoji = t.valor >= 95 ? '👏' : (t.valor >= 90 ? '👍' : '✋');
            let trofeus = '🏆'.repeat(t.trofeus);
            let estiloCard = t.valor >= 95 ? 'border-4 border-yellow-400 bg-yellow-50' : 'border border-slate-200 bg-white';

            return `
                <div class="p-3 rounded-xl card-turma shadow-md flex flex-col justify-between ${estiloCard}">
                    <div class="flex justify-between items-start leading-tight">
                        <div class="flex flex-col">
                            <span class="font-black text-slate-800 text-[11px] md:text-[13px] uppercase truncate w-32 md:w-40">${t.nome}</span>
                            <span class="text-[10px] mt-0.5">${trofeus}</span>
                        </div>
                        <span class="text-base">${emoji}</span>
                    </div>
                    <div class="${corTexto} font-black text-2xl md:text-3xl my-1">
                        ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}%
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 border border-slate-200 overflow-hidden">
                        <div class="barra-frequencia h-full rounded-full" style="background-color: ${corBarra}; width: ${t.valor}% !important;"></div>
                    </div>
                </div>`;
        }

        function iniciarLoop(total) {
            if (total <= 1) {
                document.getElementById('indicador-pagina').innerText = "PAINEL ÚNICO";
                return;
            }
            
            setInterval(() => {
                const slides = document.querySelectorAll('.pagina-slide');
                slides[indexSlide].classList.remove('active');
                indexSlide = (indexSlide + 1) % total;
                slides[indexSlide].classList.add('active');
                document.getElementById('indicador-pagina').innerText = Página ${indexSlide + 1} de ${total};
            }, 10000); // TROCA A CADA 10 SEGUNDOS
            
            document.getElementById('indicador-pagina').innerText = Página 1 de ${total};
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

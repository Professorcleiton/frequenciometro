<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro Digital - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fundo-quadriculado {
            background-color: #ffffff;
            background-image: 
                linear-gradient(rgba(200, 200, 200, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 200, 200, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .barra-frequencia {
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
            width: 0;
        }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl border-4 border-blue-900 overflow-hidden">
        
        <header class="p-6 border-b-2 border-gray-100 flex flex-col md:flex-row items-center justify-between bg-white">
            <div class="text-center md:text-left">
                <h1 class="text-2xl md:text-4xl font-black text-gray-800 uppercase leading-none">Colégio Estadual <br>Cívico Militar Anchieta</h1>
                <p class="text-blue-700 font-bold tracking-[0.2em] mt-2 text-xl italic uppercase">Frequenciômetro</p>
            </div>
            <div class="text-right mt-4 md:mt-0">
                <p class="text-gray-400 font-bold text-sm uppercase">Cruzeiro do Oeste - PR</p>
                <p id="data-atual" class="text-blue-900 font-bold"></p>
            </div>
        </header>

        <main class="p-6 fundo-quadriculado">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <section class="space-y-4">
                    <h3 class="bg-orange-500 text-white text-center font-black py-2 rounded-lg shadow uppercase">Manhã</h3>
                    <div id="container-manha1" class="space-y-3"></div>
                </section>

                <section class="space-y-4">
                    <h3 class="bg-cyan-500 text-white text-center font-black py-2 rounded-lg shadow uppercase">Manhã</h3>
                    <div id="container-manha2" class="space-y-3"></div>
                </section>

                <section class="space-y-4">
                    <h3 class="bg-green-600 text-white text-center font-black py-2 rounded-lg shadow uppercase">Tarde</h3>
                    <div id="container-tarde" class="space-y-3"></div>
                </section>

            </div>
        </main>

        <footer class="bg-slate-50 p-6 border-t-2 border-gray-100 flex flex-wrap justify-around gap-4">
            <div class="flex items-center gap-2 font-bold text-red-600 bg-white p-3 rounded-xl shadow-sm border border-red-100">
                <span class="text-3xl">😡</span> <span>ABAIXO DE 89,9%</span>
            </div>
            <div class="flex items-center gap-2 font-bold text-yellow-600 bg-white p-3 rounded-xl shadow-sm border border-yellow-100">
                <span class="text-3xl">😐</span> <span>90% A 94,9%</span>
            </div>
            <div class="flex items-center gap-2 font-bold text-green-700 bg-white p-3 rounded-xl shadow-sm border border-green-100">
                <span class="text-3xl">😊</span> <span>ACIMA DE 95%</span>
            </div>
        </footer>
    </div>

    <script>
        // COLOQUE SEU LINK DO GOOGLE SHEETS (CSV) ABAIXO:
        const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlfXs3ZlGbJoyVAQxdJd32Kx2ahdPlO0_Kv0pqCsCs6BAJwLOkjqVdA4txmHISIpswwTXfhg6YFSrc/pub?output=csv';

        async function carregarPainel() {
            try {
                const response = await fetch(URL_PLANILHA);
                const csvText = await response.text();
                
                const linhas = csvText.split(/\r?\n/);
                
                // Limpar os containers antes de renderizar
                ['manha1', 'manha2', 'tarde'].forEach(id => {
                    document.getElementById(container-${id}).innerHTML = '';
                });

                // Processar cada linha da planilha
                linhas.slice(1).forEach(linha => {
                    const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                    
                    if (colunas.length < 2) return;

                    const nomeTurma = colunas[0].replace(/"/g, '').trim();
                    let freqLimpa = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                    const bloco = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                    
                    const freqValor = parseFloat(freqLimpa);

                    if (!isNaN(freqValor)) {
                        renderizarTurma(nomeTurma, freqValor, bloco);
                    }
                });

                // Ativar animação das barras
                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.width = b.dataset.width + '%';
                    });
                }, 200);

            } catch (error) {
                console.error("Erro:", error);
            }
        }

        function renderizarTurma(nome, valor, bloco) {
            const container = document.getElementById(container-${bloco});
            if (!container) return;

            let corBarra = "bg-red-500";
            let corTexto = "text-red-700";
            let emoji = "😡";

            if (valor >= 95) {
                corBarra = "bg-green-500";
                corTexto = "text-green-700";
                emoji = "😊";
            } else if (valor >= 90) {
                corBarra = "bg-yellow-500";
                corTexto = "text-yellow-700";
                emoji = "😐";
            }

            const card = `
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-black text-gray-700 text-xs uppercase">${nome}</span>
                        <span class="${corTexto} font-black">${valor}% ${emoji}</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3 border border-gray-200 overflow-hidden">
                        <div class="barra-frequencia ${corBarra} h-full rounded-full" data-width="${valor}"></div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        }

        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
        carregarPainel();
    </script>
</body>
</html>

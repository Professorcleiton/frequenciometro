<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { background: radial-gradient(at 0% 0%, #e0e7ff 0px, transparent 50%), radial-gradient(at 100% 100%, #fef3c7 0px, transparent 50%), #f8fafc; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        .fundo-textura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('LogoA.png'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.025; z-index: -1; pointer-events: none; }
        .pagina-slide { display: none; animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pagina-slide.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
        
        /* Animação das barras verticais */
        .coluna-barra { transition: height 1.8s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .btn-ctrl { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); color: #1e3a8a; border-radius: 50%; width: 42px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s; }
        .btn-ctrl:hover { background: #1e3a8a; color: white; transform: scale(1.1); }
        
        /* Gráfico SVG */
        .grupo-barra { opacity: 0; animation: fadeUpBar 0.5s ease-out forwards; }
        @keyframes fadeUpBar { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans flex flex-col antialiased text-slate-800">

    <div class="fundo-textura"></div>

    <header class="bg-white/70 backdrop-blur-md px-10 py-3 shadow-sm border-b border-slate-200/50 flex justify-between items-center z-10 mx-6 mt-4 rounded-2xl">
        <div class="flex items-center gap-5">
            <img src="nucleo.png" alt="NRE" class="h-12 object-contain">
            <img src="Design sem nome (1) (1).jpg" alt="CCM Anchieta" class="h-16 object-contain rounded-xl shadow-sm">
        </div>
        <div class="text-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-900 to-indigo-950 bg-clip-text text-transparent uppercase tracking-tight">CCM ANCHIETA</h1>
            <p id="info-semana-detalhada" class="text-indigo-600 font-extrabold text-sm tracking-wider mt-1 uppercase">Sincronizando...</p>
        </div>
        <div class="text-right">
            <button onclick="forçarAberturaSorteio()" class="bg-indigo-600 text-white font-black text-xs px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition-all uppercase tracking-wider">🎁 SORTEIO</button>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-6 w-full max-w-[1850px] mx-auto flex items-center justify-center"></main>

    <footer class="mx-6 mb-4 bg-slate-900/95 backdrop-blur-md text-white p-3.5 rounded-2xl flex justify-between items-center px-12 text-[10px] font-bold uppercase tracking-wider">
        <div class="flex gap-4">
            <div class="flex items-center gap-2 bg-rose-500/20 text-rose-300 px-3 py-1 rounded-lg">✋ < 90%</div>
            <div class="flex items-center gap-2 bg-amber-500/20 text-amber-300 px-3 py-1 rounded-lg">👍 90-95%</div>
            <div class="flex items-center gap-2 bg-emerald-500/20 text-emerald-300 px-3 py-1 rounded-lg">👏 > 95%</div>
        </div>
        <div class="flex gap-4 items-center bg-white/10 px-5 py-1.5 rounded-full">
            <div class="btn-ctrl" onclick="mudarSlide(-1)">⬅️</div>
            <div id="btn-pause" class="btn-ctrl" onclick="togglePause()">⏸️</div>
            <div class="btn-ctrl" onclick="mudarSlide(1)">➡️</div>
        </div>
    </footer>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        const LINK_ALUNOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=6658576&single=true&output=csv";
        const LINK_HISTORICO = "https://docs.google.com/spreadsheets/d/1PiaejhJaR2-zDCHiq5ffu46DolWi5Dv6MMIN-p8TOqI/export?format=csv&gid=2003914330";

        let todasTurmas = [], todosAlunos = [], historicoEscola = [], indexSlide = 0, loopInterval, isPaused = false, sorteioEmAndamento = false, mediaGeralEscolaGlobal = 0;

        function obterCoresPorValor(valor) {
            if (valor >= 95) return "#10b981";
            if (valor >= 90) return "#f59e0b";
            return "#e11d48";
        }

        async function carregarDados() {
            try {
                const res = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const txt = await res.text();
                const linhas = txt.split(/\r?\n/).slice(1);
                todasTurmas = linhas.filter(l => l.length > 4).map(l => {
                    const c = l.split(/[,;]/);
                    return { nome: c[0].replace(/"/g,''), valor: parseFloat(c[1].replace(',','.')), bloco: c[2].toLowerCase(), trofeus: parseInt(c[3]) || 0 };
                });
                
                // Carrega Histórico
                const resHist = await fetch(LINK_HISTORICO + "&cache=" + Date.now());
                const txtH = await resHist.text();
                const linhasH = txtH.split(/\r?\n/).slice(1);
                historicoEscola = linhasH.filter(l => l.length > 3).map(l => {
                    const c = l.split(/[,;]/);
                    return { semana: c[0].replace('Sem ', 'S'), media: parseFloat(c[1].replace(',','.')) };
                }).slice(-10);

                mediaGeralEscolaGlobal = todasTurmas.reduce((a,b) => a+b.valor, 0) / todasTurmas.length;
                if(historicoEscola.length > 0) historicoEscola[historicoEscola.length-1].media = mediaGeralEscolaGlobal;

                gerarSlides();
            } catch(e) { console.error(e); }
        }

        function renderizarGraficoBarras(id) {
            const wrapper = document.getElementById(id);
            if (!wrapper) return;
            const h = 180, w = 400;
            let barHtml = "";
            historicoEscola.forEach((d, i) => {
                const height = ((d.media - 80) / 20) * h;
                barHtml += `<rect x="${i*40 + 10}" y="${h-height}" width="30" height="${height}" fill="${obterCoresPorValor(d.media)}" rx="5"/>
                            <text x="${i*40 + 25}" y="${h-height-5}" font-size="9" text-anchor="middle" font-weight="900">${d.media.toFixed(0)}</text>`;
            });
            wrapper.innerHTML = `<svg viewBox="0 0 ${w} ${h}" class="w-full h-full">${barHtml}</svg>`;
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            // Divide as turmas em grupos de 6
            for (let i = 0; i < todasTurmas.length; i += 6) {
                const grupo = todasTurmas.slice(i, i + 6);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full";
                slide.innerHTML = `
                    <div class="flex gap-8 h-full">
                        <div class="w-1/3 glass-card rounded-3xl p-8 flex flex-col">
                            <h3 class="font-black text-slate-500 mb-4">EVOLUÇÃO HISTÓRICA</h3>
                            <div id="grafico-${i}" class="flex-grow"></div>
                        </div>
                        <div class="w-2/3 grid grid-cols-3 gap-4">
                            ${grupo.map(t => `
                                <div class="glass-card p-6 rounded-3xl flex flex-col justify-end border-b-8" style="border-bottom-color: ${obterCoresPorValor(t.valor)}">
                                    <div class="text-3xl font-black mb-2">${t.valor.toFixed(1)}%</div>
                                    <div class="w-full bg-slate-200 h-40 rounded-t-lg relative">
                                        <div class="absolute bottom-0 w-full coluna-barra" style="height: ${t.valor}%; background: ${obterCoresPorValor(t.valor)}"></div>
                                    </div>
                                    <div class="font-black text-xl mt-3 uppercase">${t.nome}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                container.appendChild(slide);
            }
            // Inicia o carrossel
            setInterval(() => {
                const slides = document.querySelectorAll('.pagina-slide');
                slides[indexSlide].classList.remove('active');
                indexSlide = (indexSlide + 1) % slides.length;
                slides[indexSlide].classList.add('active');
                // Re-renderiza o gráfico da página atual
                const g = slides[indexSlide].querySelector('.flex-grow');
                if(g) renderizarGraficoBarras(g.id);
            }, 8000);
            
            // Inicializa a primeira
            document.querySelectorAll('.pagina-slide')[0].classList.add('active');
            renderizarGraficoBarras('grafico-0');
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

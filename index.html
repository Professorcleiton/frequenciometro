<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0% !important; }
        /* Fundo super claro e limpo para destacar os cards */
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-white px-4 py-3 shadow-sm border-b-4 border-blue-900 flex flex-col md:flex-row justify-between items-center gap-4">
        
        <div class="flex items-center gap-4 md:gap-8">
            <img src="nucleo.png" alt="Núcleo Regional Umuarama" class="h-16 md:h-24 object-contain">
            <img src="logoA.png" alt="Brasão CCM Anchieta" class="h-16 md:h-24 object-contain rounded-full shadow-md border-2 border-gray-200">
            <div class="hidden md:block">
                <h1 class="text-2xl lg:text-3xl font-black text-gray-800 uppercase leading-none">Colégio Estadual</h1>
                <h1 class="text-2xl lg:text-3xl font-black text-gray-800 uppercase leading-none">Cívico Militar Anchieta</h1>
                <p class="text-blue-900 font-bold tracking-[0.3em] mt-1 text-lg italic uppercase font-serif">Frequenciômetro</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex flex-col items-end gap-1">
                <button onclick="carregarDados()" class="bg-blue-900 hover:bg-blue-800 text-white text-[10px] md:text-xs font-bold py-2 px-6 rounded shadow active:scale-95 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    ATUALIZAR DADOS
                </button>
                <p class="text-gray-600 font-bold text-[10px] md:text-xs uppercase tracking-widest mt-1">Cruzeiro do Oeste - PR</p>
            </div>
            <img src="criancas.png" alt="Mascotes CCMA" class="h-16 md:h-24 object-contain hidden sm:block drop-shadow-md">
        </div>
        
        <div class="md:hidden text-center w-full mt-2">
            <h1 class="text-lg font-black text-gray-800 uppercase leading-tight">CCM Anchieta</h1>
            <p class="text-blue-900 font-bold tracking-[0.2em] text-sm italic uppercase">Frequenciômetro</p>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 lg:p-8 w-full max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 w-full">
            
            <section class="flex flex-col w-full">
                <div class="bg-[#f97316] text-white text-center py-2 md:py-3 rounded-t-xl md:rounded-full font-black text-xl md:text-2xl shadow-md mb-4 uppercase tracking-wide">
                    Turno Manhã
                </div>
                <div id="box-manha" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 content-start"></div>
            </section>

            <section class="flex flex-col w-full">
                <div class="bg-[#16a34a] text-white text-center py-2 md:py-3 rounded-t-xl md:rounded-full font-black text-xl md:text-2xl shadow-md mb-4 uppercase tracking-wide">
                    Turno Tarde
                </div>
                <div id="box-tarde" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 content-start"></div>
            </section>

        </div>
    </main>

    <footer class="w-full mt-auto">
        <div class="text-right px-6 py-1 text-gray-500 font-medium text-sm">
            Professor Cleiton
        </div>
        <div class="bg-gray-800 text-white p-3 flex flex-wrap justify-center gap-4 md:gap-8 text-xs md:text-sm font-bold uppercase tracking-wider">
            <div>[<span class="text-green-400">VERDE</span> = Boa (>95%)]</div>
            <div>[<span class="text-yellow-400">AMARELO</span> = Atenção (90-95%)]</div>
            <div>[<span class="text-red-400">VERMELHO</span> = Crítica (<90%)]</div>
        </div>
    </footer>

    <script>
        // O LINK DA SUA PLANILHA
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&v=" + Date.now());
                const csvStr = await response.text();
                
                // Limpa as duas colunas principais
                document.getElementById('box-manha').innerHTML = '';
                document.getElementById('box-tarde').innerHTML = '';

                const linhas = csvStr.split(/\r?\n/);

                // Pula a linha 1 (títulos)
                for (let i = 1; i < linhas.length; i++) {
                    const linha = linhas[i];
                    if (!linha.trim()) continue;

                    const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                    
                    if (colunas.length >= 2) {
                        const nomeTurma = colunas[0].replace(/"/g, '').trim();
                        let freqTexto = colunas[1].replace(/"/g, '').replace('%', '').replace(',', '.').trim();
                        let blocoPlano = colunas[2] ? colunas[2].replace(/"/g, '').trim().toLowerCase() : 'tarde';
                        
                        // LÓGICA DE AGRUPAMENTO: Se o bloco tiver a palavra "manha" (manha1, manha2), vai pro bloco da Manhã. Se não, Tarde.
                        let blocoDestino = blocoPlano.includes('manha') ? 'manha' : 'tarde';
                        
                        const valorNum = parseFloat(freqTexto);

                        if (!isNaN(valorNum) && nomeTurma !== "") {
                            renderizarTurma(nomeTurma, valorNum, blocoDestino);
                        }
                    }
                }

                // Dispara animação das barras
                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 300);

            } catch (err) { console.error("Erro na leitura da planilha:", err); }
        }

        function renderizarTurma(nome, valor, bloco) {
            const box = document.getElementById('box-' + bloco);
            if (!box) return;
            
            // Regras de Cores Baseadas na sua nova Legenda
            let corBarra = valor >= 95 ? 'bg-[#16a34a]' : (valor >= 90 ? 'bg-[#eab308]' : 'bg-[#dc2626]');
            let corTexto = valor >= 95 ? 'text-[#16a34a]' : (valor >= 90 ? 'text-[#eab308]' : 'text-[#dc2626]');

            // Formata o número (ex: 90.15 vira 90,15%. 90 vira 90,0%)
            let valorFormatado = Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 2 });

            const cardHTML = `
                <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col justify-between transition-transform hover:-translate-y-1 duration-300">
                    
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-black text-gray-800 text-lg md:text-xl xl:text-2xl uppercase tracking-tighter">${nome}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-900 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>

                    <div class="${corTexto} font-black text-3xl md:text-4xl xl:text-5xl mb-2 tracking-tight">
                        ${valorFormatado}%
                    </div>

                    <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                        <div class="barra-frequencia ${corBarra} h-full rounded-full" data-width="${valor > 100 ? 100 : valor}"></div>
                    </div>
                </div>`;
                
            box.innerHTML += cardHTML;
        }

        // Auto-carregamento inicial e atualização a cada 15 minutos
        window.onload = () => {
            carregarDados();
            setInterval(carregarDados, 900000); 
        };
    </script>
</body>
</html>

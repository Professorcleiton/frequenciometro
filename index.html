<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenciômetro CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        body { background-color: #f1f5f9; overflow: hidden; position: relative; margin: 0; padding: 0; }
        .fundo-textura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('LogoA.png'); background-repeat: repeat; background-size: 400px; opacity: 0.04; z-index: -1; pointer-events: none; }
        .pagina-slide { display: none; animation: fadeIn 0.8s forwards; }
        .pagina-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-turma { border-left-width: 16px; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        /* Estilo do Podium */
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 380px; margin-top: 20px; }
        .podium-item { display: flex; flex-direction: column; align-items: center; width: 250px; border-radius: 20px 20px 0 0; position: relative; padding-bottom: 20px; }
        .podium-1 { height: 100%; background: linear-gradient(to top, #ca8a04, #facc15); order: 2; z-index: 3; }
        .podium-2 { height: 80%; background: linear-gradient(to top, #4b5563, #9ca3af); order: 1; }
        .podium-3 { height: 65%; background: linear-gradient(to top, #7c2d12, #b45309); order: 3; }
        .medalha { font-size: 5rem; margin-bottom: -10px; z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }

        /* Botão de Pause */
        #btn-pause {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #btn-pause:hover { background: #1e3a8a; transform: scale(1.1); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans h-screen flex flex-col">

    <div class="fundo-textura"></div>

    <div id="btn-pause" onclick="togglePause()" title="Pausar/Retomar">
        <span id="icon-pause">⏸️</span>
    </div>

    <header class="bg-white/95 px-8 py-1 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <img src="nucleo.png" alt="NRE" class="h-14 object-contain">
            <img src="LogoA.png" alt="CCM Anchieta" class="h-28 object-contain py-1">
            <div class="ml-2 text-[#1e3a8a]">
                <h1 class="text-3xl md:text-4xl font-black uppercase leading-none tracking-tighter">CCM ANCHIETA</h1>
                <p class="text-slate-500 font-bold tracking-[0.2em] text-[10px] uppercase italic">FREQUENCIÔMETRO DIGITAL</p>
            </div>
        </div>
        <div class="text-right">
            <p id="indicador-pagina" class="text-blue-900 font-black text-[10px] uppercase bg-blue-100 px-4 py-1 rounded-full mb-1">Sincronizando...</p>
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
        </div>
    </header>

    <main id="container-slides" class="flex-grow p-4 w-full max-w-[1850px] mx-auto overflow-hidden z-10">
        <p id="msg-espera" class="text-blue-900 font-bold animate-pulse text-2xl text-center mt-20">CARREGANDO...</p>
    </main>

    <footer class="w-full bg-[#0f172a] text-white p-2 flex justify-between items-center px-16 text-xs font-black uppercase tracking-widest shrink-0 z-10">
        <div class="flex gap-12">
            <div class="flex items-center gap-3"><span>✋</span> < 90%</div>
            <div class="flex items-center gap-3"><span>👍</span> 90-95%</div>
            <div class="flex items-center gap-3"><span>👏</span> > 95%</div>
        </div>
        <img src="criancas.png" alt="Estudantes" class="h-12 object-contain">
    </footer>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?output=csv";
        let todasTurmas = [];
        let indexSlide = 0;
        let loopInterval = null;
        let isPaused = false;

        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('icon-pause');
            const btn = document.getElementById('btn-pause');
            
            if (isPaused) {
                clearInterval(loopInterval);
                icon.innerText = '▶️';
                btn.style.background = '#10b981'; // Verde quando pausado para indicar que pode dar play
            } else {
                icon.innerText = '⏸️';
                btn.style.background = 'rgba(15, 23, 42, 0.8)';
                iniciarAnimacao();
            }
        }

        function obterIconeSerie(nome) {
            const n = nome.trim();
            if (n.startsWith('6')) return '✏️'; if (n.startsWith('7')) return '📖'; if (n.startsWith('8')) return '🔬'; 
            if (n.startsWith('9')) return '🎓'; if (n.startsWith('1')) return '💻'; if (n.startsWith('2')) return '🧪'; 
            if (n.startsWith('3')) return '🚀'; return '🏫'; 
        }

        async function carregarDados() {
            try {
                const response = await fetch(LINK_PLANILHA + "&cache=" + Date.now());
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim().length > 3);
                todasTurmas = [];
                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(",");
                    if (cols.length < 3) cols = linhas[i].split(";");
                    if (cols.length >= 2) {
                        const nome = cols[0].replace(/"/g, "").trim();
                        let vLimpo = cols[1].replace(/"/g, "").trim().replace(",", ".");
                        const freq = parseFloat(vLimpo);
                        const turno = cols[2] ? cols[2].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "tarde";
                        const trof = cols[3] ? parseInt(cols[3].replace(/[^\d]/g, "")) || 0 : 0;
                        if (nome.length > 0 && !isNaN(freq)) {
                            todasTurmas.push({ nome, valor: freq, bloco: turno, trofeus: trof, icone: obterIconeSerie(nome) });
                        }
                    }
                }
                if (todasTurmas.length > 0) gerarSlides();
            } catch (err) { console.error(err); }
        }

        function gerarSlides() {
            const container = document.getElementById("container-slides");
            container.innerHTML = "";
            const manha = todasTurmas.filter(t => t.bloco.includes("manha"));
            const tarde = todasTurmas.filter(t => t.bloco.includes("tarde"));
            
            if (manha.length > 0) montarPaginas(manha, "TURNO MANHÃ", "bg-blue-600");
            if (tarde.length > 0) montarPaginas(tarde, "TURNO TARDE", "bg-blue-900");

            const top3 = [...todasTurmas].sort((a, b) => b.valor - a.valor).slice(0, 3);
            if (top3.length >= 3) {
                const pSlide = document.createElement("div");
                pSlide.className = "pagina-slide w-full h-full pt-10";
                pSlide.innerHTML = `
                    <div class="flex flex-col h-full items-center">
                        <div class="bg-yellow-500 text-blue-950 py-3 px-20 rounded-full font-black text-4xl mb-4 shadow-xl border-4 border-yellow-200 uppercase">🏆 PODIUM DE EXCELÊNCIA 🏆</div>
                        <div class="podium-container">
                            <div class="podium-item podium-2 shadow-2xl"><span class="medalha">🥈</span><div class="mt-auto text-center px-4"><p class="text-white font-black text-2xl uppercase">${top3[1].nome}</p><p class="text-white font-black text-4xl">${top3[1].valor.toFixed(1)}%</p></div></div>
                            <div class="podium-item podium-1 shadow-2xl scale-110"><span class="medalha">🥇</span><div class="mt-auto text-center px-4"><p class="text-blue-900 font-black text-3xl uppercase">${top3[0].nome}</p><p class="text-blue-900 font-black text-5xl">${top3[0].valor.toFixed(1)}%</p></div></div>
                            <div class="podium-item podium-3 shadow-2xl"><span class="medalha">🥉</span><div class="mt-auto text-center px-4"><p class="text-white font-black text-2xl uppercase">${top3[2].nome}</p><p class="text-white font-black text-4xl">${top3[2].valor.toFixed(1)}%</p></div></div>
                        </div>
                    </div>`;
                container.appendChild(pSlide);
            }

            const mediaGeral = todasTurmas.reduce((acc, t) => acc + t.valor, 0) / todasTurmas.length;
            let corD = mediaGeral >= 95 ? "#10b981" : (mediaGeral >= 90 ? "#f59e0b" : "#e11d48");
            let bordaD = mediaGeral >= 95 ? "border-emerald-900" : (mediaGeral >= 90 ? "border-amber-700" : "border-rose-900");
            const mSlide = document.createElement("div");
            mSlide.className = "pagina-slide w-full h-full";
            mSlide.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full">
                    <div class="bg-white/90 p-10 rounded-[3rem] shadow-2xl border-b-[15px] ${bordaD} flex flex-col items-center max-w-4xl w-full">
                        <img src="LogoA.png" class="h-48 mb-4 object-contain">
                        <h2 class="text-4xl font-black uppercase tracking-tighter mb-4" style="color: ${corD}">MÉDIA GERAL DO COLÉGIO</h2>
                        <div class="text-[12rem] leading-none font-black my-2 drop-shadow-xl" style="color: ${corD}">${mediaGeral.toFixed(1)}%</div>
                        <p class="text-2xl font-black italic uppercase mt-4 opacity-90" style="color: ${corD}">"Ninguém é tão forte quanto todos nós juntos!"</p>
                    </div>
                </div>`;
            container.appendChild(mSlide);
            iniciarAnimacao();
        }

        function montarPaginas(lista, titulo, cor) {
            const container = document.getElementById("container-slides");
            for (let i = 0; i < lista.length; i += 6) {
                const pedaço = lista.slice(i, i + 6);
                const slide = document.createElement("div");
                slide.className = "pagina-slide w-full h-full pt-4";
                slide.innerHTML = `
                    <div class="flex flex-col h-full items-center">
                        <div class="${cor} text-white py-3 px-20 rounded-full font-black text-3xl mb-10 shadow-md uppercase tracking-[0.2em] w-fit text-center shrink-0">${titulo}</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full">
                            ${pedaço.map(t => {
                                const corB = t.valor >= 95 ? "#10b981" : (t.valor >= 90 ? "#f59e0b" : "#e11d48");
                                return `
                                    <div class="p-6 rounded-3xl card-turma border-l-[20px] text-left">
                                        <div class="flex justify-between items-center mb-4">
                                            <p class="font-black text-slate-900 text-4xl uppercase truncate">${t.icone} ${t.nome}</p>
                                            <span class="text-3xl">${t.valor >= 95 ? '👏' : (t.valor >= 90 ? '👍' : '✋')}</span>
                                        </div>
                                        <div class="w-full bg-slate-200 rounded-2xl h-16 overflow-hidden relative shadow-inner">
                                            <div class="barra-frequencia h-full text-3xl" style="background-color: ${corB}; width: ${t.valor > 100 ? 100 : t.valor}%">${t.valor.toFixed(1)}%</div>
                                        </div>
                                        <p class="text-xl mt-3 text-center">${"🏆".repeat(t.trofeus)}</p>
                                    </div>`;
                            }).join("")}
                        </div>
                    </div>`;
                container.appendChild(slide);
            }
        }

        function iniciarAnimacao() {
            if (loopInterval) clearInterval(loopInterval);
            if (isPaused) return; // Não reinicia se estiver pausado

            const slides = document.querySelectorAll(".pagina-slide");
            if (slides.length === 0) return;
            
            // Garante que o slide atual continue visível
            slides.forEach(s => s.classList.remove("active"));
            slides[indexSlide].classList.add('active');
            
            document.getElementById("indicador-pagina").innerText = "Página " + (indexSlide + 1) + " de " + slides.length;
            
            loopInterval = setInterval(() => {
                slides[indexSlide].classList.remove("active");
                indexSlide = (indexSlide + 1) % slides.length;
                slides[indexSlide].classList.add("active");
                document.getElementById("indicador-pagina").innerText = "Página " + (indexSlide + 1) + " de " + slides.length;
            }, 10000);
        }

        window.onload = carregarDados;
        setInterval(() => { if (!isPaused) carregarDados(); }, 300000);
    </script>
</body>
</html>

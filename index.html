<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência CCM Anchieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .barra-frequencia { transition: width 1.5s ease-in-out; width: 0% !important; }
        body { background-color: #f1f5f9; }
        .card-turma { min-height: 110px; border-left-width: 8px; }
        /* Permite rolar a página se houver muitas turmas */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="bg-white px-6 py-4 shadow-md border-b-4 border-[#1e3a8a] flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <img src="nucleo.png" alt="NRE" class="h-10 md:h-12 object-contain opacity-80">
            <img src="logoA.png" alt="Brasão" class="h-16 md:h-24 object-contain rounded-full border-2 border-[#1e3a8a] bg-white p-0.5">
            <div class="text-[#1e3a8a]">
                <h1 class="text-xl md:text-3xl font-black uppercase leading-none">CCM Anchieta</h1>
                <p class="text-slate-500 font-bold tracking-widest text-[10px] uppercase italic mt-1">Frequenciômetro Digital</p>
            </div>
        </div>
        <div class="text-right hidden sm:block">
            <p class="text-[#1e3a8a] font-bold text-[10px] uppercase tracking-widest">Cruzeiro do Oeste - PR</p>
            <img src="criancas.png" alt="Mascotes" class="h-12 md:h-20 object-contain mt-1">
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 w-full max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section>
                <div class="bg-blue-600 text-white text-center py-3 rounded-full font-black text-xl shadow-lg mb-6 uppercase">Turno Manhã</div>
                <div id="box-manha" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </section>

            <section>
                <div class="bg-blue-900 text-white text-center py-3 rounded-full font-black text-xl shadow-lg mb-6 uppercase">Turno Tarde</div>
                <div id="box-tarde" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </section>
        </div>
    </main>

    <footer class="bg-[#0f172a] text-white p-3 flex justify-center gap-8 text-xs font-bold uppercase sticky bottom-0">
        <div class="flex items-center gap-2"><span>✋</span> < 90,00%</div>
        <div class="flex items-center gap-2"><span>👍</span> 90,00 - 94,99%</div>
        <div class="flex items-center gap-2"><span>👏</span> > 95,00%</div>
    </footer>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbbgsqbbRy_wIwBiuFdcsGH-Bioh3jSerab3k3lm5hYuXZrUR5WtfJXPy-wgGBwLs6zvwEiVDitiDj/pub?gid=0&single=true&output=csv';

        async function carregarDados() {
            try {
                const response = await fetch(URL_CSV + "&nocache=" + new Date().getTime());
                const csvStr = await response.text();
                
                const boxManha = document.getElementById('box-manha');
                const boxTarde = document.getElementById('box-tarde');
                boxManha.innerHTML = '';
                boxTarde.innerHTML = '';

                const linhas = csvStr.split(/\r?\n/).filter(l => l.trim().length > 5);

                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(';');
                    if (cols.length < 2) cols = linhas[i].split(',');
                    
                    if (cols.length >= 2) {
                        const nome = cols[0].replace(/"/g, '').trim();
                        const freqLimpa = cols[1].replace(/[^\d,.]/g, '').replace(',', '.');
                        const valor = parseFloat(freqLimpa);
                        const bloco = cols[2] ? cols[2].toLowerCase() : 'tarde';
                        const trofeus = cols[3] ? parseInt(cols[3]) || 0 : 0;

                        if (!isNaN(valor) && nome !== "") {
                            const card = criarCard(nome, valor, trofeus);
                            if (bloco.includes('manha')) boxManha.innerHTML += card;
                            else boxTarde.innerHTML += card;
                        }
                    }
                }

                // Anima as barras após carregar
                setTimeout(() => {
                    document.querySelectorAll('.barra-frequencia').forEach(b => {
                        b.style.setProperty('width', b.dataset.width + '%', 'important');
                    });
                }, 500);

            } catch (err) { console.error("Erro ao carregar:", err); }
        }

        function criarCard(nome, valor, trofeus) {
            const corBarra = valor >= 95 ? '#10b981' : (valor >= 90 ? '#f59e0b' : '#e11d48');
            const borda = valor >= 95 ? 'border-emerald-500' : (valor >= 90 ? 'border-amber-400' : 'border-rose-600');
            const corTexto = valor >= 95 ? 'text-emerald-700' : (valor >= 90 ? 'text-amber-600' : 'text-rose-700');
            const emoji = valor >= 95 ? '👏' : (valor >= 90 ? '👍' : '✋');
            
            return `
                <div class="p-3 rounded-xl card-turma shadow-md flex flex-col justify-between bg-white ${borda} border-l-8">
                    <div class="flex justify-between items-start leading-none">
                        <div class="text-left">
                            <p class="font-black text-slate-800 text-[13px] uppercase truncate w-32 md:w-40">${nome}</p>
                            <p class="text-[10px] mt-1">${'🏆'.repeat(trofeus)}</p>
                        </div>
                        <span class="text-lg">${emoji}</span>
                    </div>
                    <p class="${corTexto} font-black text-2xl my-1 text-left">${valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}%</p>
                    <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden border border-slate-100">
                        <div class="barra-frequencia h-full" style="background-color: ${corBarra};" data-width="${valor > 100 ? 100 : valor}"></div>
                    </div>
                </div>`;
        }

        window.onload = carregarDados;
        // Atualiza a cada 5 minutos
        setInterval(carregarDados, 300000);
    </script>
</body>
</html>
